<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বিজ্ঞান ল্যাব — ভার্চুয়াল বিজ্ঞানাগার</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --glow: rgba(0,212,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== ANIMATED BACKGROUND ===== */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(16,185,129,0.05) 0%, transparent 70%),
      #0a0e1a;
  }

  .stars {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(0,212,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, rgba(124,58,237,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 20%, rgba(0,212,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 55%, rgba(16,185,129,0.5) 0%, transparent 100%);
    background-size: 300px 300px;
    animation: twinkle 8s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* ===== GRID OVERLAY ===== */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ===== MAIN WRAPPER ===== */
  .wrapper {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center;
  }

  /* ===== HEADER ===== */
  header {
    width: 100%; text-align: center;
    padding: 50px 20px 20px;
    position: relative;
  }

  .logo-icon {
    font-size: 3rem;
    display: block;
    animation: float 4s ease-in-out infinite;
    margin-bottom: 12px;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .site-title {
    font-family: 'Tiro Bangla', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 400;
    background: linear-gradient(135deg, #00d4ff, #7c3aed, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .site-sub {
    font-size: 1rem;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* ===== NAV BAR ===== */
  .breadcrumb {
    width: 90%; max-width: 800px;
    display: flex; align-items: center; gap: 8px;
    margin: 30px 0 0;
    padding: 12px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    font-size: 0.85rem;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .breadcrumb span { color: var(--accent); opacity: 0.5; }
  .breadcrumb .bc-item {
    cursor: pointer; color: var(--text-dim);
    transition: color 0.2s;
  }
  .breadcrumb .bc-item:hover { color: var(--accent); }
  .breadcrumb .bc-item.active { color: var(--accent); }

  /* ===== SCREEN CONTAINER ===== */
  .screen-container {
    width: 90%; max-width: 1100px;
    margin: 40px auto 60px;
    animation: screenIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes screenIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ===== SCREEN TITLE ===== */
  .screen-title {
    font-family: 'Tiro Bangla', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    text-align: center;
    margin-bottom: 12px;
    color: var(--text);
  }

  .screen-desc {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 50px;
    line-height: 1.7;
  }

  /* ===== CLASS CARDS (Screen 1) ===== */
  .class-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 24px;
  }

  .class-card {
    position: relative;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 36px 28px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    text-align: center;
  }

  .class-card::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--card-glow);
    opacity: 0;
    transition: opacity 0.4s;
    border-radius: 20px;
  }

  .class-card:hover::before { opacity: 1; }

  .class-card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: var(--card-accent);
    box-shadow: 0 20px 60px var(--card-shadow);
  }

  .class-card .card-emoji {
    font-size: 2.8rem;
    margin-bottom: 16px;
    display: block;
    transition: transform 0.4s;
  }

  .class-card:hover .card-emoji { transform: scale(1.2) rotate(-5deg); }

  .class-card .card-label {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
  }

  .class-card .card-sub {
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .class-card .card-badge {
    display: inline-block;
    margin-top: 14px;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    background: rgba(255,255,255,0.07);
    color: var(--card-accent);
    border: 1px solid var(--card-accent);
    opacity: 0.8;
  }

  /* Card color themes */
  .card-blue {
    --card-accent: #00d4ff;
    --card-glow: linear-gradient(135deg, rgba(0,212,255,0.06), transparent);
    --card-shadow: rgba(0,212,255,0.15);
  }
  .card-purple {
    --card-accent: #a78bfa;
    --card-glow: linear-gradient(135deg, rgba(167,139,250,0.06), transparent);
    --card-shadow: rgba(167,139,250,0.15);
  }
  .card-green {
    --card-accent: #10b981;
    --card-glow: linear-gradient(135deg, rgba(16,185,129,0.06), transparent);
    --card-shadow: rgba(16,185,129,0.15);
  }
  .card-gold {
    --card-accent: #f59e0b;
    --card-glow: linear-gradient(135deg, rgba(245,158,11,0.08), transparent);
    --card-shadow: rgba(245,158,11,0.2);
  }

  /* ===== MODE CARDS (Screen 2) ===== */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    max-width: 750px;
    margin: 0 auto;
  }

  .mode-card {
    position: relative;
    border-radius: 24px;
    padding: 50px 36px;
    cursor: pointer;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }

  .mode-card.exp-card {
    background: linear-gradient(135deg, #0d1f3c, #1a3a5c);
    border: 1px solid rgba(0,212,255,0.2);
  }

  .mode-card.model-card {
    background: linear-gradient(135deg, #1a0d3c, #2d1a5c);
    border: 1px solid rgba(124,58,237,0.2);
  }

  .mode-card:hover {
    transform: translateY(-10px);
  }

  .mode-card.exp-card:hover {
    box-shadow: 0 30px 80px rgba(0,212,255,0.2);
    border-color: rgba(0,212,255,0.5);
  }

  .mode-card.model-card:hover {
    box-shadow: 0 30px 80px rgba(124,58,237,0.25);
    border-color: rgba(124,58,237,0.5);
  }

  .mode-icon {
    font-size: 4rem;
    margin-bottom: 20px;
    display: block;
    animation: float 4s ease-in-out infinite;
  }

  .mode-card.model-card .mode-icon { animation-delay: -2s; }

  .mode-title {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.6rem;
    margin-bottom: 12px;
    color: #fff;
  }

  .mode-desc {
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.7;
  }

  .mode-tag {
    display: inline-block;
    margin-top: 20px;
    padding: 6px 18px;
    border-radius: 30px;
    font-size: 0.78rem;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .exp-card .mode-tag {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
  }

  .model-card .mode-tag {
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: #a78bfa;
  }

  /* ===== SUBJECT CARDS (Screen 3 — class 9-10) ===== */
  .subject-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  .subject-card {
    position: relative;
    border-radius: 22px;
    padding: 44px 30px;
    cursor: pointer;
    text-align: center;
    border: 1px solid transparent;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }

  .sub-physics {
    background: linear-gradient(135deg, #0d2137, #132d4a);
    border-color: rgba(0,212,255,0.15);
  }
  .sub-chemistry {
    background: linear-gradient(135deg, #1a1a0d, #2a2a0f);
    border-color: rgba(234,179,8,0.15);
  }
  .sub-biology {
    background: linear-gradient(135deg, #0d200d, #0f2b0f);
    border-color: rgba(16,185,129,0.15);
  }

  .subject-card:hover { transform: translateY(-10px) scale(1.03); }

  .sub-physics:hover { box-shadow: 0 30px 70px rgba(0,212,255,0.2); border-color: rgba(0,212,255,0.4); }
  .sub-chemistry:hover { box-shadow: 0 30px 70px rgba(234,179,8,0.2); border-color: rgba(234,179,8,0.4); }
  .sub-biology:hover { box-shadow: 0 30px 70px rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.4); }

  .sub-icon { font-size: 3.5rem; display: block; margin-bottom: 16px; animation: float 5s ease-in-out infinite; }
  .sub-chemistry .sub-icon { animation-delay: -1.5s; }
  .sub-biology .sub-icon { animation-delay: -3s; }

  .sub-title {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.5rem;
    color: #fff;
    margin-bottom: 8px;
  }

  .sub-desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; }

  /* ===== CONTENT SCREEN (Final Screen) ===== */
  .content-hero {
    text-align: center;
    margin-bottom: 50px;
  }

  .content-hero .big-icon { font-size: 5rem; animation: float 4s ease-in-out infinite; display: block; margin-bottom: 20px; }

  .content-section-title {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.6rem;
    margin-bottom: 24px;
    color: var(--text);
    display: flex; align-items: center; gap: 12px;
  }

  .content-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
  }

  .experiment-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 50px;
  }

  .exp-item {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 20px 22px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; gap: 14px;
  }

  .exp-item:hover {
    background: var(--surface2);
    border-color: var(--accent);
    transform: translateX(6px);
    box-shadow: -4px 0 20px rgba(0,212,255,0.1);
  }

  .exp-num {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(124,58,237,0.15));
    border: 1px solid rgba(0,212,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 600;
    flex-shrink: 0;
  }

  .exp-name { font-size: 0.9rem; color: var(--text); line-height: 1.4; }

  .coming-soon-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 16px;
    border-radius: 30px;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--gold);
    font-size: 0.8rem;
    margin-top: 8px;
  }

  /* ===== BACK BUTTON ===== */
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px;
    border-radius: 30px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.9rem;
    font-family: 'Hind Siliguri', sans-serif;
    transition: all 0.3s;
    margin-bottom: 36px;
  }

  .back-btn:hover {
    background: rgba(0,212,255,0.08);
    border-color: rgba(0,212,255,0.3);
    color: var(--accent);
  }

  /* ===== FOOTER ===== */
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-size: 0.8rem;
    border-top: 1px solid rgba(255,255,255,0.05);
    width: 100%;
  }

  /* ===== PULSE DOT ===== */
  .pulse {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    50% { transform: scale(1.3); opacity: 0.8; box-shadow: 0 0 0 6px rgba(16,185,129,0); }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .mode-grid { grid-template-columns: 1fr; }
    .class-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .class-card { padding: 24px 16px; }
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="stars"></div>
<div class="grid-overlay"></div>

<div class="wrapper">

  <!-- HEADER -->
  <header>
    <span class="logo-icon">🔬</span>
    <h1 class="site-title">বিজ্ঞান ল্যাব</h1>
    <p class="site-sub"><span class="pulse"></span> ভার্চুয়াল বিজ্ঞানাগার · বাংলাদেশ</p>
  </header>

  <!-- BREADCRUMB -->
  <nav class="breadcrumb" id="breadcrumb">
    <span class="bc-item active" onclick="goHome()">🏠 হোম</span>
  </nav>

  <!-- SCREENS -->
  <div class="screen-container" id="mainContent">
    <!-- Rendered by JS -->
  </div>

  <footer>
    © ২০২৬ বিজ্ঞান ল্যাব — সকল শ্রেণির শিক্ষার্থীদের জন্য ভার্চুয়াল বিজ্ঞান অভিজ্ঞতা, "বিজ্ঞান কে খাতা কলমে নয় বাস্তবে শেখো"- মোঃ শোয়াইব হাসান 
  </footer>
</div>

<script>
// ===== STATE =====
let state = { screen: 'home', class: null, subject: null };

// ===== DATA =====
const experiments = {
  '৬': [
    'পানিচক্র পর্যবেক্ষণ', 'উদ্ভিদের আলোক সংশ্লেষণ', 'বায়ুর উপাদান পরীক্ষা',
    'অ্যাসিড-ক্ষারক পরীক্ষা', 'পরিবাহী ও অপরিবাহী', 'শব্দের বিস্তার পরীক্ষা'
  ],
  '৭': [
    'বাষ্পীভবন ও ঘনীভবন', 'চুম্বকের ধর্ম', 'তাপ পরিবহন পরীক্ষা',
    'দ্রবণ ও মিশ্রণ', 'খাদ্যের পরীক্ষা', 'আলোর প্রতিফলন'
  ],
  '৮': [
    'রাসায়নিক পরিবর্তন', 'বিদ্যুৎ বর্তনী তৈরি', 'লেন্স দিয়ে আলো',
    'উদ্ভিদ কোষ পর্যবেক্ষণ', 'গতির সূত্র পরীক্ষা', 'অসমোসিস পরীক্ষা'
  ],
  'physics': [
    'নিউটনের গতিসূত্র', 'সরল দোলক পরীক্ষা', 'তরঙ্গ ও শব্দ',
    'আলোর বিচ্ছুরণ', 'বৈদ্যুতিক বর্তনী', 'তাপমাত্রা ও তাপধারণ',
    'চুম্বক ও বিদ্যুৎ', 'প্রিজম দিয়ে বর্ণালী'
  ],
  'chemistry': [
    'পর্যায় সারণী পরীক্ষা', 'অ্যাসিড-ক্ষার টাইট্রেশন', 'বৈদ্যুতিক বিশ্লেষণ',
    'জারণ-বিজারণ', 'পলিমার তৈরি', 'রঙিন শিখা পরীক্ষা',
    'ক্রোমাটোগ্রাফি', 'কার্বন বিশ্লেষণ'
  ],
  'biology': [
    'কোষ বিভাজন', 'রক্ত পর্যবেক্ষণ', 'DNA মডেল তৈরি',
    'উদ্ভিদের বৃদ্ধি পরীক্ষা', 'পরিপাকতন্ত্র', 'পরিবেশ ও বাস্তুতন্ত্র',
    'প্রাণীর শ্রেণিবিন্যাস', 'শ্বসন প্রক্রিয়া'
  ]
};

// ===== RENDER =====
function render() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '';
  const d = document.createElement('div');
  d.style.animation = 'screenIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards';

  if (state.screen === 'home') renderHome(d);
  else if (state.screen === 'classMode') renderClassMode(d);
  else if (state.screen === 'subjects') renderSubjects(d);
  else if (state.screen === 'content') renderContent(d);

  c.appendChild(d);
  updateBreadcrumb();
}

function renderHome(d) {
  d.innerHTML = `
    <h2 class="screen-title">তোমার শ্রেণি বেছে নাও</h2>
    <p class="screen-desc">বাংলাদেশ জাতীয় পাঠ্যক্রম অনুযায়ী এক্সপেরিমেন্ট ও থ্রিডি মডেল</p>
    <div class="class-grid">
      <div class="class-card card-blue" onclick="selectClass('৬')">
        <span class="card-emoji">📘</span>
        <div class="card-label">ষষ্ঠ শ্রেণি</div>
        <div class="card-sub">Class Six</div>
        <div class="card-badge">১৫+ এক্সপেরিমেন্ট</div>
      </div>
      <div class="class-card card-purple" onclick="selectClass('৭')">
        <span class="card-emoji">📗</span>
        <div class="card-label">সপ্তম শ্রেণি</div>
        <div class="card-sub">Class Seven</div>
        <div class="card-badge">১৮+ এক্সপেরিমেন্ট</div>
      </div>
      <div class="class-card card-green" onclick="selectClass('৮')">
        <span class="card-emoji">📙</span>
        <div class="card-label">অষ্টম শ্রেণি</div>
        <div class="card-sub">Class Eight</div>
        <div class="card-badge">২০+ এক্সপেরিমেন্ট</div>
      </div>
      <div class="class-card card-gold" onclick="selectClass('৯-১০')">
        <span class="card-emoji">📕</span>
        <div class="card-label">নবম ও দশম শ্রেণি</div>
        <div class="card-sub">Class Nine & Ten</div>
        <div class="card-badge">৫০+ এক্সপেরিমেন্ট</div>
      </div>
    </div>
  `;
}

function renderClassMode(d) {
  const isHigher = state.class === '৯-১০';
  if (isHigher) { renderSubjects(d); return; }

  d.innerHTML = `
    <button class="back-btn" onclick="goHome()">← হোম</button>
    <h2 class="screen-title">${state.class} শ্রেণি — কী দেখতে চাও?</h2>
    <p class="screen-desc">এক্সপেরিমেন্ট করো অথবা থ্রিডি মডেলে দেখো</p>
    <div class="mode-grid">
      <div class="mode-card exp-card" onclick="selectMode('experiment')">
        <span class="mode-icon">⚗️</span>
        <div class="mode-title">এক্সপেরিমেন্ট</div>
        <div class="mode-desc">তোমার বইয়ের সকল পরীক্ষা-নিরীক্ষা ভার্চুয়ালি করো। ধাপে ধাপে নির্দেশনা সহ।</div>
        <span class="mode-tag">🧪 EXPERIMENT</span>
      </div>
      <div class="mode-card model-card" onclick="selectMode('3d')">
        <span class="mode-icon">🌐</span>
        <div class="mode-title">থ্রিডি মডেল</div>
        <div class="mode-desc">বইয়ের সকল বিষয় থ্রিডিতে দেখো। ঘোরাও, জুম করো, বিস্তারিত জানো।</div>
        <span class="mode-tag">🔮 3D MODEL</span>
      </div>
    </div>
  `;
}

function renderSubjects(d) {
  d.innerHTML = `
    <button class="back-btn" onclick="goHome()">← হোম</button>
    <h2 class="screen-title">নবম ও দশম শ্রেণি — বিষয় বেছে নাও</h2>
    <p class="screen-desc">পদার্থবিজ্ঞান, রসায়ন ও জীববিজ্ঞানের সম্পূর্ণ ল্যাব</p>
    <div class="subject-grid">
      <div class="subject-card sub-physics" onclick="selectSubject('physics')">
        <span class="sub-icon">⚡</span>
        <div class="sub-title">পদার্থবিজ্ঞান</div>
        <div class="sub-desc">গতি, আলো, শব্দ, তাপ, বিদ্যুৎ ও চুম্বক</div>
      </div>
      <div class="subject-card sub-chemistry" onclick="selectSubject('chemistry')">
        <span class="sub-icon">🧪</span>
        <div class="sub-title">রসায়ন</div>
        <div class="sub-desc">পরমাণু, বন্ধন, বিক্রিয়া ও পর্যায় সারণী</div>
      </div>
      <div class="subject-card sub-biology" onclick="selectSubject('biology')">
        <span class="sub-icon">🧬</span>
        <div class="sub-title">জীববিজ্ঞান</div>
        <div class="sub-desc">কোষ, জীবন প্রক্রিয়া ও বাস্তুতন্ত্র</div>
      </div>
    </div>
  `;
}

function renderContent(d) {
  const key = state.subject || state.class;
  const expList = experiments[key] || [];
  const modeLabel = state.mode === 'experiment' ? '⚗️ এক্সপেরিমেন্ট' : '🌐 থ্রিডি মডেল';
  const isExp = state.mode === 'experiment';

  d.innerHTML = `
    <button class="back-btn" onclick="goBack()">← পেছনে যাও</button>
    <div class="content-hero">
      <span class="big-icon">${isExp ? '⚗️' : '🌐'}</span>
      <h2 class="screen-title">${modeLabel}</h2>
      <p class="screen-desc">${isExp ? 'একটি এক্সপেরিমেন্ট বেছে শুরু করো' : 'থ্রিডি মডেল দেখতে নিচের তালিকা থেকে বেছে নাও'}</p>
    </div>

    <div class="content-section-title">📋 তালিকা</div>
    <div class="experiment-list">
      ${expList.map((e, i) => `
        <div class="exp-item" onclick="showComingSoon()">
          <div class="exp-num">${String(i+1).padStart(2,'0')}</div>
          <div class="exp-name">${e}</div>
        </div>
      `).join('')}
    </div>

    <div style="text-align:center">
      <div class="coming-soon-badge">⏳ কন্টেন্ট তৈরি হচ্ছে — শীঘ্রই আসছে!</div>
    </div>
  `;
}

// ===== ACTIONS =====
function selectClass(cls) {
  state.class = cls;
  state.screen = cls === '৯-১০' ? 'subjects' : 'classMode';
  render();
}

function selectMode(mode) {
  state.mode = mode;
  state.screen = 'content';
  render();
}

function selectSubject(sub) {
  state.subject = sub;
  state.screen = 'classMode-hs';
  renderSubjectMode();
}

function renderSubjectMode() {
  const c = document.getElementById('mainContent');
  const labels = { physics: 'পদার্থবিজ্ঞান', chemistry: 'রসায়ন', biology: 'জীববিজ্ঞান' };
  c.innerHTML = `<div style="animation: screenIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards">
    <button class="back-btn" onclick="selectClass('৯-১০')">← বিষয়সমূহ</button>
    <h2 class="screen-title">${labels[state.subject]} — কী দেখতে চাও?</h2>
    <p class="screen-desc">এক্সপেরিমেন্ট করো অথবা থ্রিডি মডেলে দেখো</p>
    <div class="mode-grid">
      <div class="mode-card exp-card" onclick="selectMode('experiment')">
        <span class="mode-icon">⚗️</span>
        <div class="mode-title">এক্সপেরিমেন্ট</div>
        <div class="mode-desc">ভার্চুয়ালি পরীক্ষা-নিরীক্ষা করো ধাপে ধাপে নির্দেশনা সহ।</div>
        <span class="mode-tag">🧪 EXPERIMENT</span>
      </div>
      <div class="mode-card model-card" onclick="selectMode('3d')">
        <span class="mode-icon">🌐</span>
        <div class="mode-title">থ্রিডি মডেল</div>
        <div class="mode-desc">সকল বিষয় থ্রিডিতে দেখো, ঘোরাও ও বিস্তারিত জানো।</div>
        <span class="mode-tag">🔮 3D MODEL</span>
      </div>
    </div>
  </div>`;
  updateBreadcrumb();
}

function goHome() {
  state = { screen: 'home', class: null, subject: null };
  render();
}

function goBack() {
  if (state.subject) {
    renderSubjectMode();
  } else {
    state.screen = 'classMode';
    render();
  }
}

function showComingSoon() {
  alert('🚧 এই কন্টেন্টটি শীঘ্রই যুক্ত হবে!');
}

// ===== BREADCRUMB =====
function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const labels = { physics: 'পদার্থবিজ্ঞান', chemistry: 'রসায়ন', biology: 'জীববিজ্ঞান' };
  let html = `<span class="bc-item" onclick="goHome()">🏠 হোম</span>`;

  if (state.class) {
    html += `<span>›</span><span class="bc-item">${state.class} শ্রেণি</span>`;
  }
  if (state.subject) {
    html += `<span>›</span><span class="bc-item">${labels[state.subject]}</span>`;
  }
  if (state.mode) {
    html += `<span>›</span><span class="bc-item active">${state.mode === 'experiment' ? 'এক্সপেরিমেন্ট' : 'থ্রিডি মডেল'}</span>`;
  }

  bc.innerHTML = html;
}

// ===== INIT =====
render();
</script>
</body>
</html>
