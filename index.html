<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বিজ্ঞান ল্যাব — দাখিল ষষ্ঠ শ্রেণি</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 60%),
      #0a0e1a;
  }
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .wrapper { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; text-align: center; padding: 40px 20px 10px; }
  .logo-icon { font-size: 2.8rem; display: block; animation: float 4s ease-in-out infinite; margin-bottom: 10px; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .site-title {
    font-family: 'Tiro Bangla', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    background: linear-gradient(135deg, #00d4ff, #7c3aed, #10b981);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.2; margin-bottom: 6px;
  }
  .site-sub { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; font-weight: 300; }
  .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); margin-right: 5px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(16,185,129,0.4)} 50%{transform:scale(1.3);box-shadow:0 0 0 6px rgba(16,185,129,0)} }
  .breadcrumb {
    width: 90%; max-width: 800px; display: flex; align-items: center; gap: 8px;
    margin: 24px 0 0; padding: 10px 18px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px; font-size: 0.82rem; color: var(--text-dim); flex-wrap: wrap;
  }
  .breadcrumb .bc-item { cursor: pointer; color: var(--text-dim); transition: color 0.2s; }
  .breadcrumb .bc-item:hover, .breadcrumb .bc-item.active { color: var(--accent); }
  .screen-container { width: 90%; max-width: 1100px; margin: 30px auto 60px; animation: screenIn 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes screenIn { from{opacity:0;transform:translateY(28px) scale(0.97)} to{opacity:1;transform:none} }
  .screen-title { font-family: 'Tiro Bangla', serif; font-size: clamp(1.3rem, 3vw, 1.9rem); text-align: center; margin-bottom: 8px; }
  .screen-desc { text-align: center; color: var(--text-dim); font-size: 0.9rem; margin-bottom: 40px; line-height: 1.7; }
  /* CLASS CARDS */
  .class-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
  .class-card {
    position: relative; background: var(--surface); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px; padding: 32px 24px; cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1); overflow: hidden; text-align: center;
  }
  .class-card::before { content:''; position:absolute; inset:0; background:var(--card-glow); opacity:0; transition:opacity 0.4s; border-radius:20px; }
  .class-card:hover::before { opacity:1; }
  .class-card:hover { transform: translateY(-8px) scale(1.02); border-color: var(--card-accent); box-shadow: 0 20px 60px var(--card-shadow); }
  .class-card .card-emoji { font-size: 2.5rem; margin-bottom: 14px; display: block; transition: transform 0.4s; }
  .class-card:hover .card-emoji { transform: scale(1.2) rotate(-5deg); }
  .class-card .card-label { font-family: 'Tiro Bangla', serif; font-size: 1.2rem; color: var(--text); margin-bottom: 6px; }
  .class-card .card-sub { font-size: 0.78rem; color: var(--text-dim); letter-spacing: 1px; }
  .class-card .card-badge { display:inline-block; margin-top:12px; padding:3px 12px; border-radius:20px; font-size:0.72rem; background:rgba(255,255,255,0.07); color:var(--card-accent); border:1px solid var(--card-accent); opacity:0.8; }
  .card-blue { --card-accent:#00d4ff; --card-glow:linear-gradient(135deg,rgba(0,212,255,0.06),transparent); --card-shadow:rgba(0,212,255,0.15); }
  .card-purple { --card-accent:#a78bfa; --card-glow:linear-gradient(135deg,rgba(167,139,250,0.06),transparent); --card-shadow:rgba(167,139,250,0.15); }
  .card-green { --card-accent:#10b981; --card-glow:linear-gradient(135deg,rgba(16,185,129,0.06),transparent); --card-shadow:rgba(16,185,129,0.15); }
  .card-gold { --card-accent:#f59e0b; --card-glow:linear-gradient(135deg,rgba(245,158,11,0.08),transparent); --card-shadow:rgba(245,158,11,0.2); }
  /* MODE CARDS */
  .mode-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px; max-width:700px; margin:0 auto; }
  .mode-card { position:relative; border-radius:22px; padding:44px 32px; cursor:pointer; text-align:center; transition:all 0.4s cubic-bezier(0.16,1,0.3,1); overflow:hidden; }
  .exp-card { background:linear-gradient(135deg,#0d1f3c,#1a3a5c); border:1px solid rgba(0,212,255,0.2); }
  .model-card { background:linear-gradient(135deg,#1a0d3c,#2d1a5c); border:1px solid rgba(124,58,237,0.2); }
  .mode-card:hover { transform:translateY(-10px); }
  .exp-card:hover { box-shadow:0 30px 80px rgba(0,212,255,0.2); border-color:rgba(0,212,255,0.5); }
  .model-card:hover { box-shadow:0 30px 80px rgba(124,58,237,0.25); border-color:rgba(124,58,237,0.5); }
  .mode-icon { font-size:3.5rem; margin-bottom:18px; display:block; animation:float 4s ease-in-out infinite; }
  .model-card .mode-icon { animation-delay:-2s; }
  .mode-title { font-family:'Tiro Bangla',serif; font-size:1.5rem; margin-bottom:10px; color:#fff; }
  .mode-desc { font-size:0.88rem; color:var(--text-dim); line-height:1.7; }
  .mode-tag { display:inline-block; margin-top:18px; padding:5px 16px; border-radius:30px; font-size:0.75rem; letter-spacing:1px; font-weight:500; }
  .exp-card .mode-tag { background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--accent); }
  .model-card .mode-tag { background:rgba(124,58,237,0.15); border:1px solid rgba(124,58,237,0.3); color:#a78bfa; }
  /* SUBJECT CARDS */
  .subject-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; max-width:860px; margin:0 auto; }
  .subject-card { border-radius:20px; padding:40px 26px; cursor:pointer; text-align:center; border:1px solid transparent; transition:all 0.4s cubic-bezier(0.16,1,0.3,1); overflow:hidden; }
  .sub-physics { background:linear-gradient(135deg,#0d2137,#132d4a); border-color:rgba(0,212,255,0.15); }
  .sub-chemistry { background:linear-gradient(135deg,#1a1a0d,#2a2a0f); border-color:rgba(234,179,8,0.15); }
  .sub-biology { background:linear-gradient(135deg,#0d200d,#0f2b0f); border-color:rgba(16,185,129,0.15); }
  .subject-card:hover { transform:translateY(-10px) scale(1.03); }
  .sub-physics:hover { box-shadow:0 30px 70px rgba(0,212,255,0.2); border-color:rgba(0,212,255,0.4); }
  .sub-chemistry:hover { box-shadow:0 30px 70px rgba(234,179,8,0.2); border-color:rgba(234,179,8,0.4); }
  .sub-biology:hover { box-shadow:0 30px 70px rgba(16,185,129,0.2); border-color:rgba(16,185,129,0.4); }
  .sub-icon { font-size:3rem; display:block; margin-bottom:14px; animation:float 5s ease-in-out infinite; }
  .sub-chemistry .sub-icon { animation-delay:-1.5s; } .sub-biology .sub-icon { animation-delay:-3s; }
  .sub-title { font-family:'Tiro Bangla',serif; font-size:1.4rem; color:#fff; margin-bottom:6px; }
  .sub-desc { font-size:0.82rem; color:var(--text-dim); line-height:1.6; }
  /* CHAPTER LIST */
  .chapter-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-bottom:30px; }
  .chapter-item {
    background:var(--surface); border:1px solid rgba(255,255,255,0.07); border-radius:14px;
    padding:16px 18px; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; gap:12px;
  }
  .chapter-item:hover { background:var(--surface2); border-color:var(--accent); transform:translateX(5px); box-shadow:-3px 0 18px rgba(0,212,255,0.1); }
  .ch-num { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(124,58,237,0.15)); border:1px solid rgba(0,212,255,0.2); display:flex; align-items:center; justify-content:center; font-size:0.78rem; color:var(--accent); font-weight:600; flex-shrink:0; }
  .ch-info .ch-title { font-size:0.88rem; color:var(--text); line-height:1.4; }
  .ch-info .ch-sub { font-size:0.72rem; color:var(--text-dim); margin-top:3px; }
  /* EXPERIMENT LIST */
  .exp-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; margin-bottom:30px; }
  .exp-item { background:var(--surface); border:1px solid rgba(255,255,255,0.07); border-radius:13px; padding:14px 16px; cursor:pointer; transition:all 0.3s; display:flex; align-items:flex-start; gap:12px; }
  .exp-item:hover { background:var(--surface2); border-color:var(--accent3); transform:translateX(5px); }
  .exp-num { width:32px; height:32px; border-radius:8px; background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.25); display:flex; align-items:center; justify-content:center; font-size:0.72rem; color:var(--accent3); font-weight:700; flex-shrink:0; margin-top:2px; }
  .exp-name { font-size:0.85rem; color:var(--text); line-height:1.5; }
  .exp-ch { font-size:0.7rem; color:var(--text-dim); margin-top:3px; }
  /* BACK BTN */
  .back-btn { display:inline-flex; align-items:center; gap:8px; padding:9px 20px; border-radius:30px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:var(--text-dim); cursor:pointer; font-size:0.88rem; font-family:'Hind Siliguri',sans-serif; transition:all 0.3s; margin-bottom:30px; }
  .back-btn:hover { background:rgba(0,212,255,0.08); border-color:rgba(0,212,255,0.3); color:var(--accent); }
  /* SECTION TITLE */
  .section-title { font-family:'Tiro Bangla',serif; font-size:1.2rem; margin-bottom:18px; color:var(--text); display:flex; align-items:center; gap:10px; }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(255,255,255,0.1),transparent); }
  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.2s; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal { background:var(--surface2); border:1px solid rgba(255,255,255,0.1); border-radius:24px; padding:36px; max-width:600px; width:100%; max-height:85vh; overflow-y:auto; position:relative; }
  .modal-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.08); border:none; color:var(--text-dim); width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; font-family:sans-serif; }
  .modal-close:hover { background:rgba(255,0,0,0.2); color:#fff; }
  .modal-title { font-family:'Tiro Bangla',serif; font-size:1.4rem; margin-bottom:8px; color:var(--text); padding-right:40px; }
  .modal-chapter { font-size:0.8rem; color:var(--accent); margin-bottom:20px; letter-spacing:1px; }
  .modal-section { margin-bottom:18px; }
  .modal-section-title { font-size:0.85rem; color:var(--accent3); font-weight:600; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
  .modal-text { font-size:0.88rem; color:var(--text-dim); line-height:1.8; }
  .step-list { list-style:none; }
  .step-list li { display:flex; gap:10px; margin-bottom:10px; font-size:0.88rem; color:var(--text-dim); line-height:1.6; }
  .step-num { width:22px; height:22px; border-radius:50%; background:rgba(0,212,255,0.15); border:1px solid rgba(0,212,255,0.3); display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:var(--accent); flex-shrink:0; margin-top:2px; }
  .materials-list { display:flex; flex-wrap:wrap; gap:8px; }
  .material-tag { padding:4px 12px; background:rgba(124,58,237,0.12); border:1px solid rgba(124,58,237,0.25); border-radius:20px; font-size:0.78rem; color:#a78bfa; }
  .coming-soon { text-align:center; padding:40px 20px; color:var(--text-dim); font-size:0.9rem; }
  .coming-soon .big { font-size:3rem; display:block; margin-bottom:12px; }
  footer { position:relative; z-index:1; text-align:center; padding:20px; color:var(--text-dim); font-size:0.75rem; border-top:1px solid rgba(255,255,255,0.05); width:100%; }
  @media(max-width:600px){ .mode-grid{grid-template-columns:1fr} .class-grid{grid-template-columns:repeat(2,1fr);gap:12px} .class-card{padding:22px 14px} }
</style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="wrapper">
  <header>
    <span class="logo-icon">🔬</span>
    <h1 class="site-title">বিজ্ঞান ল্যাব</h1>
    <p class="site-sub"><span class="pulse"></span>ভার্চুয়াল বিজ্ঞানাগার · NCTB দাখিল</p>
  </header>
  <nav class="breadcrumb" id="breadcrumb"></nav>
  <div class="screen-container" id="mainContent"></div>
  <footer>© ২০২৫ বিজ্ঞান ল্যাব — NCTB দাখিল পাঠ্যক্রম অনুযায়ী</footer>
</div>

let state = { screen:'home', cls:null, mode:null, subject:null };

function render() {
  const c = document.getElementById('mainContent');
  const d = document.createElement('div');
  d.style.animation = 'screenIn 0.45s cubic-bezier(0.16,1,0.3,1) forwards';
  if (state.screen==='home') renderHome(d);
  else if (state.screen==='classMode') renderClassMode(d);
  else if (state.screen==='subjects') renderSubjects(d);
  else if (state.screen==='subjectMode') renderSubjectMode(d);
  else if (state.screen==='content') renderContent(d);
  c.innerHTML=''; c.appendChild(d);
  updateBreadcrumb();
}

        <span class="sub-icon">⚡</span>
        <div class="sub-title">পদার্থবিজ্ঞান</div>
        <div class="sub-desc">শীঘ্রই আসছে</div>
      </div>
      <div class="subject-card sub-chemistry" onclick="selectSubject('chemistry')">
        <span class="sub-icon">🧪</span>
        <div class="sub-title">রসায়ন</div>
        <div class="sub-desc">শীঘ্রই আসছে</div>
      </div>
      <div class="subject-card sub-biology" onclick="selectSubject('biology')">
        <span class="sub-icon">🧬</span>
        <div class="sub-title">জীববিজ্ঞান</div>
        <div class="sub-desc">শীঘ্রই আসছে</div>
      </div>
    </div>`;
}

function renderSubjectMode(d) {
  d.innerHTML=`
    <button class="back-btn" onclick="selectClass('৯-১০')">← বিষয়সমূহ</button>
    <h2 class="screen-title">শীঘ্রই আসছে!</h2>
    <div class="coming-soon"><span class="big">🚧</span>নবম-দশম শ্রেণির কন্টেন্ট তৈরি হচ্ছে</div>`;
}

function renderContent(d) {
  const cls = DATA[state.cls];
  const isExp = state.mode==='experiment';
  const items = isExp ? cls.experiments : cls.models3d;

  d.innerHTML=`
    <button class="back-btn" onclick="selectClass('${state.cls}')">← পেছনে</button>
    <h2 class="screen-title">${isExp?'⚗️ এক্সপেরিমেন্ট':'🌐 থ্রিডি মডেল'} — ${cls.label}</h2>
    <p class="screen-desc">${isExp?'একটি এক্সপেরিমেন্টে ক্লিক করো বিস্তারিত দেখতে':'একটি মডেলে ক্লিক করো বিস্তারিত দেখতে'}</p>
    <div class="section-title">${isExp?'📋':'🔮'} ${items.length}টি ${isExp?'এক্সপেরিমেন্ট':'থ্রিডি মডেল'}</div>
    <div class="${isExp?'exp-list':'chapter-grid'}">
      ${items.map((item,i)=>`
        <div class="${isExp?'exp-item':'chapter-item'}" onclick="${isExp?`showExp('${item.id}')`:`show3D('${item.id}')`}">
          <div class="${isExp?'exp-num':'ch-num'}">${String(i+1).padStart(2,'0')}</div>
          <div class="${isExp?'':'ch-info'}">
            <div class="${isExp?'exp-name':'ch-title'}">${item.title}</div>
            <div class="${isExp?'exp-ch':'ch-sub'}">${item.chapter}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function showExp(id) {
  const cls = DATA[state.cls];
  const exp = cls.experiments.find(e=>e.id===id);
  if(!exp) return;
  const html=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-title">⚗️ ${exp.title}</div>
        <div class="modal-chapter">📖 ${exp.chapter}</div>
        <div class="modal-section">
          <div class="modal-section-title">🧰 প্রয়োজনীয় উপকরণ</div>
          <div class="materials-list">${exp.materials.map(m=>`<span class="material-tag">${m}</span>`).join('')}</div>
        </div>
        <div class="modal-section">
          <div class="modal-section-title">📝 পদ্ধতি</div>
          <ul class="step-list">${exp.steps.map((s,i)=>`<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}</ul>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function show3D(id) {
  const cls = DATA[state.cls];
  const m = cls.models3d.find(x=>x.id===id);
  if(!m) return;
  const html=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-title">🌐 ${m.title}</div>
        <div class="modal-chapter">📖 ${m.chapter}</div>
        <div class="modal-section">
          <div class="modal-section-title">📋 বিষয়বস্তু</div>
          <div class="modal-text">${m.desc}</div>
        </div>
        <div class="coming-soon" style="padding:30px 0 0">
          <span style="font-size:2rem;display:block;margin-bottom:10px">🚧</span>
          <div style="font-size:0.85rem;color:var(--text-dim)">থ্রিডি মডেলটি তৈরি হচ্ছে — শীঘ্রই যোগ করা হবে!</div>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeModal() {
  const m = document.querySelector('.modal-overlay');
  if(m) m.remove();
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function selectClass(cls) {
  state.cls = cls;
  if(cls==='৯-১০') { state.screen='subjects'; }
  else if(DATA[cls]) { state.screen='classMode'; }
  else { alert('এই শ্রেণির কন্টেন্ট শীঘ্রই আসছে!'); return; }
  render();
}

function selectMode(mode) { state.mode=mode; state.screen='content'; render(); }
function selectSubject(sub) { state.subject=sub; state.screen='subjectMode'; render(); }
function goHome() { state={screen:'home',cls:null,mode:null,subject:null}; render(); }

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html=`<span class="bc-item" onclick="goHome()">🏠 হোম</span>`;
  if(state.cls) html+=`<span>›</span><span class="bc-item">${state.cls==='৯-১০'?'নবম-দশম':state.cls+' শ্রেণি'}</span>`;
  if(state.subject) { const sl={physics:'পদার্থ',chemistry:'রসায়ন',biology:'জীব'}; html+=`<span>›</span><span class="bc-item">${sl[state.subject]}</span>`; }
  if(state.mode) html+=`<span>›</span><span class="bc-item active">${state.mode==='experiment'?'এক্সপেরিমেন্ট':'থ্রিডি মডেল'}</span>`;
  bc.innerHTML=html;
}

render();
</script>
</body>
</html>
