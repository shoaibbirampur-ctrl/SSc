<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বিজ্ঞানের পাঠশালা</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--accent:#00d4ff;--a2:#7c3aed;--a3:#10b981;--gold:#f59e0b;--text:#e2e8f0;--dim:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(124,58,237,.12),transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(0,212,255,.1),transparent 60%),#0a0e1a}
.grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:60px 60px}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{width:100%;text-align:center;padding:35px 20px 8px}
.logo{font-size:2.5rem;display:block;animation:float 4s ease-in-out infinite;margin-bottom:8px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-family:'Tiro Bangla',serif;font-size:clamp(1.6rem,5vw,2.7rem);background:linear-gradient(135deg,#00d4ff,#7c3aed,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:5px}
.sub{font-size:.8rem;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--a3);margin-right:5px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{transform:scale(1.3);box-shadow:0 0 0 6px rgba(16,185,129,0)}}
.bc{width:90%;max-width:800px;display:flex;align-items:center;gap:8px;margin:18px 0 0;padding:9px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:50px;font-size:.78rem;color:var(--dim);flex-wrap:wrap}
.bc .bi{cursor:pointer;color:var(--dim);transition:color .2s}
.bc .bi:hover,.bc .bi.a{color:var(--accent)}
.sc{width:90%;max-width:1100px;margin:26px auto 60px;animation:si .45s cubic-bezier(.16,1,.3,1) forwards}
@keyframes si{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.st{font-family:'Tiro Bangla',serif;font-size:clamp(1.2rem,3vw,1.8rem);text-align:center;margin-bottom:7px}
.sd{text-align:center;color:var(--dim);font-size:.87rem;margin-bottom:34px;line-height:1.7}
/* CLASS GRID */
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px}
.cc{position:relative;background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:28px 20px;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);overflow:hidden;text-align:center}
.cc::before{content:'';position:absolute;inset:0;background:var(--cg);opacity:0;transition:opacity .4s;border-radius:18px}
.cc:hover::before{opacity:1}
.cc:hover{transform:translateY(-8px) scale(1.02);border-color:var(--ca);box-shadow:0 20px 60px var(--cs)}
.cc .ce{font-size:2.2rem;margin-bottom:12px;display:block;transition:transform .4s}
.cc:hover .ce{transform:scale(1.2) rotate(-5deg)}
.cc .cl{font-family:'Tiro Bangla',serif;font-size:1.1rem;color:var(--text);margin-bottom:5px}
.cc .cs2{font-size:.73rem;color:var(--dim);letter-spacing:1px}
.cc .cb{display:inline-block;margin-top:10px;padding:3px 11px;border-radius:20px;font-size:.68rem;background:rgba(255,255,255,.07);color:var(--ca);border:1px solid var(--ca);opacity:.8}
.c1{--ca:#00d4ff;--cg:linear-gradient(135deg,rgba(0,212,255,.06),transparent);--cs:rgba(0,212,255,.15)}
.c2{--ca:#a78bfa;--cg:linear-gradient(135deg,rgba(167,139,250,.06),transparent);--cs:rgba(167,139,250,.15)}
.c3{--ca:#10b981;--cg:linear-gradient(135deg,rgba(16,185,129,.06),transparent);--cs:rgba(16,185,129,.15)}
.c4{--ca:#f59e0b;--cg:linear-gradient(135deg,rgba(245,158,11,.08),transparent);--cs:rgba(245,158,11,.2)}
/* MODE */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:22px;max-width:680px;margin:0 auto}
.mc{position:relative;border-radius:20px;padding:38px 28px;cursor:pointer;text-align:center;transition:all .4s cubic-bezier(.16,1,.3,1)}
.ec{background:linear-gradient(135deg,#0d1f3c,#1a3a5c);border:1px solid rgba(0,212,255,.2)}
.dc{background:linear-gradient(135deg,#1a0d3c,#2d1a5c);border:1px solid rgba(124,58,237,.2)}
.mc:hover{transform:translateY(-10px)}
.ec:hover{box-shadow:0 30px 80px rgba(0,212,255,.2);border-color:rgba(0,212,255,.5)}
.dc:hover{box-shadow:0 30px 80px rgba(124,58,237,.25);border-color:rgba(124,58,237,.5)}
.mi{font-size:3.2rem;margin-bottom:16px;display:block;animation:float 4s ease-in-out infinite}
.dc .mi{animation-delay:-2s}
.mt{font-family:'Tiro Bangla',serif;font-size:1.35rem;margin-bottom:9px;color:#fff}
.md{font-size:.84rem;color:var(--dim);line-height:1.7}
.mtg{display:inline-block;margin-top:15px;padding:5px 14px;border-radius:30px;font-size:.71rem;letter-spacing:1px;font-weight:500}
.ec .mtg{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent)}
.dc .mtg{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#a78bfa}
/* SUBJECT */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;max-width:840px;margin:0 auto}
.scard{border-radius:18px;padding:36px 24px;cursor:pointer;text-align:center;border:1px solid transparent;transition:all .4s cubic-bezier(.16,1,.3,1)}
.sphy{background:linear-gradient(135deg,#0d2137,#132d4a);border-color:rgba(0,212,255,.15)}
.sche{background:linear-gradient(135deg,#1a1a0d,#2a2a0f);border-color:rgba(234,179,8,.15)}
.sbio:background:linear-gradient(135deg,#0d200d,#0f2b0f);border-color:rgba(16,185,129,.15)}
.scard:hover{transform:translateY(-10px) scale(1.03)}
.sphy:hover{box-shadow:0 30px 70px rgba(0,212,255,.2);border-color:rgba(0,212,255,.4)}
.sche:hover{box-shadow:0 30px 70px rgba(234,179,8,.2);border-color:rgba(234,179,8,.4)}
.sbio:hover{box-shadow:0 30px 70px rgba(16,185,129,.2);border-color:rgba(16,185,129,.4)}
.si2{font-size:2.8rem;display:block;margin-bottom:12px;animation:float 5s ease-in-out infinite}
.sche .si2{animation-delay:-1.5s}.sbio .si2{animation-delay:-3s}
.stt{font-family:'Tiro Bangla',serif;font-size:1.3rem;color:#fff;margin-bottom:5px}
.sdd{font-size:.8rem;color:var(--dim);line-height:1.5}
/* LIST */
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:11px;margin-bottom:28px}
.li{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:13px 15px;cursor:pointer;transition:all .3s;display:flex;align-items:flex-start;gap:11px}
.li:hover{background:var(--surface2);border-color:var(--ic,var(--accent));transform:translateX(5px)}
.in{width:30px;height:30px;border-radius:8px;background:var(--ib,rgba(0,212,255,.1));border:1px solid var(--ibr,rgba(0,212,255,.25));display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--ic,var(--accent));font-weight:700;flex-shrink:0;margin-top:2px}
.it{font-size:.84rem;color:var(--text);line-height:1.4}
.is{font-size:.68rem;color:var(--dim);margin-top:2px}
/* BACK */
.bb{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:30px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--dim);cursor:pointer;font-size:.84rem;font-family:'Hind Siliguri',sans-serif;transition:all .3s;margin-bottom:24px}
.bb:hover{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.3);color:var(--accent)}
.sect{font-family:'Tiro Bangla',serif;font-size:1.05rem;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:10px}
.sect::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.1),transparent)}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;animation:fo .2s}
@keyframes fo{from{opacity:0}to{opacity:1}}
.mo{background:var(--surface2);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:28px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;position:relative}
.mc2{position:absolute;top:13px;right:13px;background:rgba(255,255,255,.08);border:none;color:var(--dim);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:sans-serif}
.mc2:hover{background:rgba(255,0,0,.2);color:#fff}
.mtt{font-family:'Tiro Bangla',serif;font-size:1.3rem;margin-bottom:6px;color:var(--text);padding-right:36px}
.mch{font-size:.76rem;color:var(--accent);margin-bottom:16px;letter-spacing:1px}
.ms{margin-bottom:15px}
.mst{font-size:.78rem;color:var(--a3);font-weight:600;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px}
.mtxt{font-size:.84rem;color:var(--dim);line-height:1.8}
.sl{list-style:none}
.sl li{display:flex;gap:9px;margin-bottom:8px;font-size:.83rem;color:var(--dim);line-height:1.6}
.sn{width:20px;height:20px;border-radius:50%;background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--accent);flex-shrink:0;margin-top:2px}
.ml{display:flex;flex-wrap:wrap;gap:7px}
.mt2{padding:3px 11px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);border-radius:20px;font-size:.73rem;color:#a78bfa}
.cs{text-align:center;padding:32px 20px;color:var(--dim);font-size:.86rem}
footer{position:relative;z-index:1;text-align:center;padding:18px;color:var(--dim);font-size:.71rem;border-top:1px solid rgba(255,255,255,.05);width:100%}
@media(max-width:600px){.mg{grid-template-columns:1fr}.cg{grid-template-columns:repeat(2,1fr);gap:12px}.cc{padding:20px 12px}}

/* Interactive Simulation Custom Style */
.lab-box{background:#0f172a;border:1px solid rgba(0,212,255,0.2);border-radius:12px;padding:15px;margin-top:15px;text-align:center;}
.beaker-container{display:flex;justify-content:center;gap:20px;margin:15px 0;}
.beaker{width:60px;height:90px;border:3px solid #e2e8f0;border-top:none;border-radius:0 0 12px 12px;position:relative;overflow:hidden;background:rgba(255,255,255,0.05)}
.liquid{position:absolute;bottom:0;left:0;right:0;height:50px;background:rgba(0,212,255,0.4);transition:all 0.5s;}
.lab-btn{padding:6px 12px;background:var(--a2);border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:0.75rem;margin:3px;transition:0.2s}
.lab-btn:hover{opacity:0.9;transform:scale(1.05)}
</style>
</head>
<body>
<div class="bg"></div><div class="grid"></div>
<div class="wrap">
<header>
  <span class="logo">🔬</span>
  <h1>বিজ্ঞানের পাঠশালা</h1>
  <p class="sub"><span class="pulse"></span>ভার্চুয়াল বিজ্ঞানাগার · বিজ্ঞান কে বানাও সহজ</p>
</header>
<nav class="bc" id="bc"></nav>
<div class="sc" id="sc"></div>
<footer>© ২০২৬ বিজ্ঞানের পাঠশালা — মোঃ শোয়াইব হাসান</footer>
</div>

  const liq = document.getElementById('liq-1');

  } else if(type==='alkali') {
    liq.style.background = 'rgba(59, 130, 246, 0.7)'; // Blue
    liq.style.height = '65px';
  } else {
    liq.style.background = 'rgba(0, 212, 255, 0.4)'; // Reset Cyan
    liq.style.height = '50px';
  }
}
