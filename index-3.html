<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বিজ্ঞানের পাঠশালা</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Tiro+Bangla&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--bg:#0a0e1a;--s1:#111827;--s2:#1a2235;--ac:#00d4ff;--pu:#7c3aed;--gr:#10b981;--go:#f59e0b;--tx:#e2e8f0;--dm:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
.bgfx{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(124,58,237,.12),transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(0,212,255,.1),transparent 60%),#0a0e1a;pointer-events:none}
.gridline{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh}
header{width:100%;text-align:center;padding:32px 20px 6px}
.logo{font-size:2.4rem;display:block;animation:bob 4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
h1{font-family:'Tiro Bangla',serif;font-size:clamp(1.5rem,5vw,2.6rem);background:linear-gradient(135deg,#00d4ff,#7c3aed,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.25;margin-bottom:4px}
.sub{font-size:.78rem;color:var(--dm);letter-spacing:3px;text-transform:uppercase}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gr);margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{transform:scale(1.3);box-shadow:0 0 0 6px rgba(16,185,129,0)}}
#bc{width:90%;max-width:800px;display:flex;align-items:center;gap:8px;margin:16px 0 0;padding:8px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:50px;font-size:.76rem;color:var(--dm);flex-wrap:wrap}
.bi{cursor:pointer;transition:color .2s}.bi:hover,.bi.on{color:var(--ac)}
#sc{width:90%;max-width:1100px;margin:24px auto 60px;transition:opacity .3s,transform .3s}
.tt{font-family:'Tiro Bangla',serif;font-size:clamp(1.1rem,3vw,1.75rem);text-align:center;margin-bottom:6px}
.dd{text-align:center;color:var(--dm);font-size:.85rem;margin-bottom:30px;line-height:1.7}
/* class cards */
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.cc{position:relative;background:var(--s1);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:26px 18px;cursor:pointer;transition:all .35s cubic-bezier(.16,1,.3,1);overflow:hidden;text-align:center}
.cc:before{content:'';position:absolute;inset:0;background:var(--cg,transparent);opacity:0;transition:opacity .35s}
.cc:hover:before{opacity:1}
.cc:hover{transform:translateY(-7px) scale(1.02);border-color:var(--ca,var(--ac));box-shadow:0 18px 50px var(--cs,rgba(0,212,255,.15))}
.ce{font-size:2.1rem;display:block;margin-bottom:10px;transition:transform .35s}
.cc:hover .ce{transform:scale(1.2) rotate(-5deg)}
.cl{font-family:'Tiro Bangla',serif;font-size:1.05rem;margin-bottom:4px}
.cs{font-size:.7rem;color:var(--dm);letter-spacing:1px}
.cb{display:inline-block;margin-top:8px;padding:2px 10px;border-radius:20px;font-size:.66rem;background:rgba(255,255,255,.07);color:var(--ca,var(--ac));border:1px solid var(--ca,var(--ac));opacity:.85}
.c1{--ca:#00d4ff;--cg:linear-gradient(135deg,rgba(0,212,255,.06),transparent);--cs:rgba(0,212,255,.15)}
.c2{--ca:#a78bfa;--cg:linear-gradient(135deg,rgba(167,139,250,.06),transparent);--cs:rgba(167,139,250,.15)}
.c3{--ca:#10b981;--cg:linear-gradient(135deg,rgba(16,185,129,.06),transparent);--cs:rgba(16,185,129,.15)}
.c4{--ca:#f59e0b;--cg:linear-gradient(135deg,rgba(245,158,11,.07),transparent);--cs:rgba(245,158,11,.18)}
/* mode */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;max-width:680px;margin:0 auto}
.mc{border-radius:20px;padding:36px 26px;cursor:pointer;text-align:center;transition:all .35s cubic-bezier(.16,1,.3,1)}
.ec{background:linear-gradient(135deg,#0d1f3c,#1a3a5c);border:1px solid rgba(0,212,255,.2)}
.dc{background:linear-gradient(135deg,#1a0d3c,#2d1a5c);border:1px solid rgba(124,58,237,.2)}
.mc:hover{transform:translateY(-10px)}
.ec:hover{box-shadow:0 28px 70px rgba(0,212,255,.2);border-color:rgba(0,212,255,.5)}
.dc:hover{box-shadow:0 28px 70px rgba(124,58,237,.22);border-color:rgba(124,58,237,.5)}
.mi{font-size:3rem;margin-bottom:14px;display:block;animation:bob 4s ease-in-out infinite}
.dc .mi{animation-delay:-2s}
.mh{font-family:'Tiro Bangla',serif;font-size:1.3rem;margin-bottom:8px;color:#fff}
.md{font-size:.82rem;color:var(--dm);line-height:1.7}
.mt{display:inline-block;margin-top:13px;padding:4px 13px;border-radius:30px;font-size:.7rem;letter-spacing:1px;font-weight:600}
.ec .mt{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--ac)}
.dc .mt{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#a78bfa}
/* subjects */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;max-width:840px;margin:0 auto}
.sc2{border-radius:18px;padding:34px 22px;cursor:pointer;text-align:center;border:1px solid transparent;transition:all .35s cubic-bezier(.16,1,.3,1)}
.sp{background:linear-gradient(135deg,#0d2137,#132d4a);border-color:rgba(0,212,255,.14)}
.sk{background:linear-gradient(135deg,#1a1a0d,#2a2a0e);border-color:rgba(234,179,8,.14)}
.sb{background:linear-gradient(135deg,#0d1f0d,#0f290f);border-color:rgba(16,185,129,.14)}
.sc2:hover{transform:translateY(-9px) scale(1.02)}
.sp:hover{box-shadow:0 28px 65px rgba(0,212,255,.18);border-color:rgba(0,212,255,.4)}
.sk:hover{box-shadow:0 28px 65px rgba(234,179,8,.18);border-color:rgba(234,179,8,.4)}
.sb:hover{box-shadow:0 28px 65px rgba(16,185,129,.18);border-color:rgba(16,185,129,.4)}
.si{font-size:2.6rem;display:block;margin-bottom:10px;animation:bob 5s ease-in-out infinite}
.sk .si{animation-delay:-1.5s}.sb .si{animation-delay:-3s}
.sh{font-family:'Tiro Bangla',serif;font-size:1.25rem;color:#fff;margin-bottom:4px}
.sd2{font-size:.78rem;color:var(--dm);line-height:1.4}
/* list */
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:10px;margin-bottom:24px}
.li{background:var(--s1);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .25s;display:flex;align-items:flex-start;gap:10px}
.li:hover{background:var(--s2);border-color:var(--lc,var(--ac));transform:translateX(4px)}
.ln{width:28px;height:28px;border-radius:7px;background:var(--lb,rgba(0,212,255,.1));border:1px solid var(--lbr,rgba(0,212,255,.25));display:flex;align-items:center;justify-content:center;font-size:.68rem;color:var(--lc,var(--ac));font-weight:700;flex-shrink:0;margin-top:1px}
.lt{font-size:.82rem;line-height:1.4}.ls{font-size:.66rem;color:var(--dm);margin-top:2px}
.bb{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:30px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--dm);cursor:pointer;font-size:.82rem;font-family:'Hind Siliguri',sans-serif;transition:all .25s;margin-bottom:22px}
.bb:hover{background:rgba(0,212,255,.07);border-color:rgba(0,212,255,.3);color:var(--ac)}
.sh2{font-family:'Tiro Bangla',serif;font-size:1rem;margin-bottom:12px;color:var(--tx);display:flex;align-items:center;gap:9px}
.sh2:after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.1),transparent)}
/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center;padding:14px;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.mo{background:var(--s2);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:26px;max-width:700px;width:100%;max-height:92vh;overflow-y:auto;position:relative}
.mx{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.08);border:none;color:var(--dm);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;transition:all .2s;font-family:sans-serif}
.mx:hover{background:rgba(239,68,68,.25);color:#fff}
.mh2{font-family:'Tiro Bangla',serif;font-size:1.25rem;margin-bottom:5px;color:var(--tx);padding-right:36px}
.mc2{font-size:.74rem;color:var(--ac);margin-bottom:14px;letter-spacing:1px}
.ms{margin-bottom:14px}
.mk{font-size:.76rem;color:var(--gr);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.mtx{font-size:.83rem;color:var(--dm);line-height:1.8}
.sl{list-style:none}
.sl li{display:flex;gap:8px;margin-bottom:7px;font-size:.81rem;color:var(--dm);line-height:1.6}
.sn2{width:19px;height:19px;border-radius:50%;background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;font-size:.63rem;color:var(--ac);flex-shrink:0;margin-top:2px}
.ml{display:flex;flex-wrap:wrap;gap:6px}
.tg{padding:3px 10px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);border-radius:20px;font-size:.71rem;color:#a78bfa}
/* sim / 3d containers */
.sb2{background:#060c16;border:1px solid rgba(0,212,255,.18);border-radius:14px;overflow:hidden;margin-top:14px}
.sh3{padding:9px 14px;background:rgba(0,212,255,.06);font-size:.78rem;color:var(--ac);font-weight:700;letter-spacing:1px;border-bottom:1px solid rgba(0,212,255,.1)}
#p5host canvas{display:block!important;max-width:100%}
.ctrls{padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.18)}
.cbtn{padding:5px 13px;border-radius:20px;border:1px solid rgba(0,212,255,.3);background:rgba(0,212,255,.07);color:var(--ac);font-size:.73rem;cursor:pointer;font-family:'Hind Siliguri',sans-serif;transition:all .2s}
.cbtn:hover,.cbtn.on{background:rgba(0,212,255,.2)}
.srow{display:flex;align-items:center;gap:8px;width:100%}
.srow label{font-size:.73rem;color:var(--dm);white-space:nowrap;min-width:95px}
.srow input[type=range]{flex:1;accent-color:var(--ac)}
.srow span{font-size:.73rem;color:var(--ac);min-width:40px;text-align:right}
.tip{padding:7px 14px;font-size:.76rem;color:var(--dm);background:rgba(0,0,0,.12);border-top:1px solid rgba(255,255,255,.05)}
/* 3d wrap */
.tdw{position:relative;border-radius:12px;overflow:hidden;border:1px solid rgba(124,58,237,.22);margin-top:14px}
#tdcanvas{width:100%;height:300px;display:block;background:#04070f}
.tdlbl{position:absolute;top:7px;left:10px;font-size:.68rem;color:#a78bfa;background:rgba(0,0,0,.5);padding:2px 9px;border-radius:20px;pointer-events:none}
.tdhint{position:absolute;bottom:7px;right:10px;font-size:.63rem;color:rgba(255,255,255,.3);pointer-events:none}
.legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.leg{padding:3px 10px;border-radius:20px;font-size:.7rem;border:1px solid transparent;cursor:pointer}
footer{position:relative;z-index:1;text-align:center;padding:16px;color:var(--dm);font-size:.7rem;border-top:1px solid rgba(255,255,255,.05);width:100%}
/* AI chatbot */
.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#7c3aed);border:none;cursor:pointer;font-size:1.5rem;box-shadow:0 8px 24px rgba(0,212,255,.35);z-index:900;display:flex;align-items:center;justify-content:center;transition:transform .25s}
.fab:hover{transform:scale(1.08)}
.askbtn{margin-top:14px;width:100%;padding:10px;border-radius:12px;border:1px solid rgba(124,58,237,.35);background:rgba(124,58,237,.1);color:#c4b5fd;font-size:.82rem;font-weight:600;cursor:pointer;font-family:'Hind Siliguri',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.askbtn:hover{background:rgba(124,58,237,.2)}
.chatpanel{position:fixed;bottom:0;right:0;width:100%;max-width:380px;height:min(560px,88vh);background:var(--s2);border:1px solid rgba(255,255,255,.1);border-radius:18px 18px 0 0;z-index:950;display:flex;flex-direction:column;box-shadow:0 -10px 50px rgba(0,0,0,.5);animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
@media(min-width:420px){.chatpanel{right:20px;border-radius:18px;bottom:20px}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.chathead{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(124,58,237,.08));border-radius:18px 18px 0 0}
.chathead .ti{font-family:'Tiro Bangla',serif;font-size:1rem;display:flex;align-items:center;gap:8px}
.chatclose{background:rgba(255,255,255,.08);border:none;color:var(--dm);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem}
.chatclose:hover{background:rgba(239,68,68,.25);color:#fff}
.chatbody{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:9px 13px;border-radius:14px;font-size:.85rem;line-height:1.6;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#00d4ff,#0ea5e9);color:#001520;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);border-bottom-left-radius:4px}
.msg.bot.loading{color:var(--dm);font-style:italic}
.chatinput{display:flex;gap:8px;padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.chatinput textarea{flex:1;resize:none;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:var(--tx);padding:9px 12px;font-family:'Hind Siliguri',sans-serif;font-size:.85rem;height:42px;max-height:100px}
.chatinput textarea:focus{outline:none;border-color:rgba(0,212,255,.4)}
.sendbtn{width:42px;height:42px;border-radius:12px;border:none;background:linear-gradient(135deg,#00d4ff,#7c3aed);color:#fff;cursor:pointer;font-size:1.1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sendbtn:disabled{opacity:.5;cursor:not-allowed}
.chatctx{padding:8px 16px;font-size:.7rem;color:#a78bfa;background:rgba(124,58,237,.08);border-bottom:1px solid rgba(255,255,255,.05)}
@media(max-width:600px){.mg{grid-template-columns:1fr}.cg{grid-template-columns:repeat(2,1fr);gap:10px}.cc{padding:18px 11px}}
</style>
</head>
<body>
<div class="bgfx"></div>
<div class="gridline"></div>
<div class="wrap">
<header>
  <span class="logo">🔬</span>
  <h1>বিজ্ঞানের পাঠশালা</h1>
  <p class="sub"><span class="dot"></span>ভার্চুয়াল বিজ্ঞানাগার · বিজ্ঞান কে বানাও সহজ</p>
</header>
<nav id="bc"></nav>
<div id="sc"></div>
<footer>© ২০২৬ বিজ্ঞানের পাঠশালা — মোঃ শোয়াইব হাসান</footer>
</div>
<button class="fab" onclick="toggleChat()" title="AI সহায়ক">🤖</button>

<script>
/* ═══════════ DATA ═══════════ */
const D={
'৬':{label:'ষষ্ঠ শ্রেণি',
 exp:[
  {id:'vernier',t:'ভার্নিয়ার ক্যালিপার্স দিয়ে পরিমাপ',ch:'১ম অধ্যায়',m:['স্লাইড ক্যালিপার্স','মাচবাক্স'],s:['প্রধান স্কেল পাঠ নাও (M)','ভার্নিয়ার সমপাতন দাগ খোঁজো (V)','পাঠ = M + (V × 0.02)','বস্তুর মাপ নাও']},
  {id:'reflection',t:'আলোর প্রতিফলন',ch:'৯ম অধ্যায়',m:['সমতল দর্পণ','টর্চলাইট'],s:['অন্ধকারে টর্চ দর্পণে ফেলো','আপতন ও প্রতিফলন কোণ মাপো','দুটো সমান দেখো']},
  {id:'lever',t:'লিভার যন্ত্র পর্যবেক্ষণ',ch:'১১শ অধ্যায়',m:['কাঠের শাসন','পেন্সিল','বই'],s:['পেন্সিলের উপর শাসন রাখো','এক প্রান্তে বই রাখো','ফালক্রাম পরিবর্তন করো']},
  {id:'conductivity',t:'ধাতুর বিদ্যুৎ পরিবাহিতা',ch:'৭ম অধ্যায়',m:['ব্যাটারি','বাল্ব','তার','বিভিন্ন পদার্থ'],s:['সার্কিট তৈরি করো','বিভিন্ন পদার্থ রাখো','বাল্ব জ্বলে কিনা দেখো']},
  {id:'evaporation',t:'লবণ পানি থেকে লবণ পৃথক',ch:'৮ম অধ্যায়',m:['লবণ পানি','চুলা','পাত্র'],s:['তাপ দাও','পানি উড়ে যাবে','লবণের কেলাস থাকবে']},
 ],
 m3d:[
  {id:'plant_cell',t:'উদ্ভিদ কোষের গঠন',ch:'৩য় অধ্যায়',parts:['কোষপ্রাচীর','নিউক্লিয়াস','ক্লোরোপ্লাস্ট','মাইটোকন্ড্রিয়া','ভ্যাকুওল']},
  {id:'solar_system',t:'সৌরজগতের গ্রহগুলো',ch:'১২শ অধ্যায়',parts:['সূর্য','বুধ','শুক্র','পৃথিবী','মঙ্গল','বৃহস্পতি','শনি']},
  {id:'earth_layers',t:'পৃথিবীর অভ্যন্তরীণ গঠন',ch:'১২শ অধ্যায়',parts:['ভূত্বক','ম্যান্টল','বাইরের কোর','ভেতরের কোর']},
 ]
},
'৭':{label:'সপ্তম শ্রেণি',

/* ═══════════ STATE & NAV ═══════════ */
let st={pg:'home',cls:null,sub:null,mode:null};
const sc=document.getElementById('sc');

function go(pg,extras={}){
  Object.assign(st,{pg},extras);
  sc.style.opacity='0';sc.style.transform='translateY(16px)';
  setTimeout(()=>{
    render();
    sc.style.transition='opacity .35s,transform .35s';
    sc.style.opacity='1';sc.style.transform='none';
    updateBC();
  },120);
}

function render(){
  if(st.pg==='home')renderHome();
  else if(st.pg==='mode')renderMode();
  else if(st.pg==='subs')renderSubs();
  else if(st.pg==='list')renderList();
}

function selCls(c){
  st.cls=c;
  if(c==='৯-১০') go('subs',{cls:null,sub:null});
  else go('mode',{cls:c,sub:null});
}

function updateBC(){
  const bc=document.getElementById('bc');
  const sl={physics:'পদার্থবিজ্ঞান',chemistry:'রসায়ন',biology:'জীববিজ্ঞান'};
  let h=`<span class="bi" onclick="go('home')">🏠 হোম</span>`;
  if(st.cls&&st.cls!=='৯-১০') h+=`<span>›</span><span class="bi">${sl[st.cls]||st.cls+' শ্রেণি'}</span>`;
  if(st.pg==='subs') h+=`<span>›</span><span class="bi">নবম-দশম</span>`;
  if(st.mode) h+=`<span>›</span><span class="bi on">${st.mode==='exp'?'সিমুলেশন':'থ্রিডি মডেল'}</span>`;
  bc.innerHTML=h;
}

/* ═══════════ MODAL HELPER ═══════════ */
function modal(html){
  const ov=document.createElement('div');ov.className='ov';
  ov.innerHTML=`<div class="mo">${html}</div>`;
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  document.body.appendChild(ov);
  return ov;
}
function closeModal(){
  const ov=document.querySelector('.ov');
  if(ov){
    // destroy p5 sketch
    if(window._p5inst){window._p5inst.remove();window._p5inst=null;}
    // destroy three renderer
    if(window._tdRenderer){window._tdRenderer.dispose();window._tdRenderer=null;cancelAnimationFrame(window._tdRaf);}
    ov.remove();
  }
  chatContext=null;chatHistory=[];
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ═══════════ SIM MODAL ═══════════ */
function openSim(id,key){
  const x=D[key].exp.find(e=>e.id===id);if(!x)return;

/* ═══════════ P5 SIMULATIONS ═══════════ */
function launchSim(id){
  const host=document.getElementById('p5host');
  if(!host)return;
  const simFns={vernier,reflection,lever,conductivity,evaporation,balloon,atom_sim,magnet_sim,litmus,circuit,freefall,electromagnet,photosynthesis,transpiration,yeast,vinegar_soda,state_change};
  const fn=simFns[id];
  if(fn){
    if(window._p5inst){window._p5inst.remove();}
    window._p5inst=new p5(fn,'p5host');
  } else {
    host.innerHTML=`<div style="padding:30px;text-align:center;color:#94a3b8;font-size:.85rem">সিমুলেশন লোড হচ্ছে…</div>`;
  }
}

/* p5 sketch factories */
function vernier(p){
  let jaw=30;
  p.setup=()=>{p.createCanvas(p.min(500,document.getElementById('p5host').offsetWidth||500),165);};
  p.draw=()=>{
    p.background(13,17,23);
    // Main scale
    p.fill(200,169,110);p.noStroke();p.rect(40,62,p.width-80,20);
    p.fill(13,17,23);
    for(let i=0;i<=(p.width-80)/10;i++){
      const x=40+i*10,h=i%10===0?20:i%5===0?13:7;
      p.rect(x,62+20-h,1.5,h);
      if(i%10===0){p.fill(120,130,150);p.textSize(9);p.textAlign(p.CENTER);p.text(i/10,x,62+20+11);p.fill(13,17,23);}
    }
    // Vernier scale
    p.fill(80,160,230);p.rect(40+jaw,40,52,22);
    p.fill(20,40,60);
    for(let i=0;i<=10;i++){const x=40+jaw+i*4.9,h=i===0?22:11;p.rect(x,40+22-h,1,h);if(i%5===0){p.textSize(8);p.textAlign(p.CENTER);p.text(i,x,38);}}
    // Jaws
    p.fill(80,90,105);p.rect(40,82,8,38);p.rect(40+jaw,82,8,32-jaw*0.15);
    // Object
    p.fill(245,158,11,180);p.rect(48,82,jaw,24);
    // Reading
    const M=Math.floor(jaw/10),V=Math.round((jaw%10)/4.9),r=(M+V*0.02).toFixed(2);
    p.fill(0,212,255);p.textSize(14);p.textAlign(p.LEFT);p.text('পাঠ: '+r+' cm',40,30);
    p.fill(148,163,184);p.textSize(11);p.text('M='+M+'.0  V='+V+'  VC=0.02',40,46);
    // drag
    if(p.mouseIsPressed&&p.mouseX>30&&p.mouseX<p.width-30) jaw=p.constrain(p.mouseX-40,0,100);
  };
  document.getElementById('simtip').textContent='👆 ক্যানভাসে ক্লিক করে চোয়াল সরাও — পাঠ স্বয়ংক্রিয়ভাবে হিসাব হবে।';
}

function reflection(p){
  let ang=45;
  const bar=document.getElementById('ctrlbar');
  bar.innerHTML=`<div class="srow"><label>আপতন কোণ</label><input type="range" min="5" max="85" value="45" oninput="this.nextSibling.textContent=this.value+'°';window._refAng=parseInt(this.value)"><span>45°</span></div>`;
  window._refAng=45;
  p.setup=()=>{p.createCanvas(p.min(500,document.getElementById('p5host').offsetWidth||500),240);};
  p.draw=()=>{
    ang=window._refAng||45;
    p.background(13,17,23);
    const cx=p.width/2,my=p.height*0.58;
    // Mirror
    p.fill(192,192,192);p.rect(cx-75,my-3,150,6);
    p.fill(192,192,192,30);p.rect(cx-75,my+3,150,8);
    // Normal
    p.stroke(255,255,255,40);p.strokeWeight(1);p.setLineDash?p.setLineDash([5,5]):null;
    p.line(cx,my-80,cx,my+80);p.noStroke();
    // Incident
    const r=ang*Math.PI/180;
    const ix=cx-Math.sin(r)*105,iy=my-Math.cos(r)*105;
    p.stroke(245,158,11);p.strokeWeight(2.5);p.line(ix,iy,cx,my);
    // Reflected
    p.stroke(0,212,255);p.line(cx,my,cx+Math.sin(r)*105,my-Math.cos(r)*105);
    p.noStroke();
    // Arcs
    p.noFill();p.stroke(245,158,11,130);p.strokeWeight(1.5);p.arc(cx,my,70,70,p.PI*1.5-r,p.PI*1.5);
    p.stroke(0,212,255,130);p.arc(cx,my,70,70,p.PI*1.5,p.PI*1.5+r);
    p.noStroke();
    // Labels
    p.fill(245,158,11);p.textSize(13);p.textAlign(p.LEFT);p.text('আপতন: '+ang+'°',10,22);
    p.fill(0,212,255);p.text('প্রতিফলন: '+ang+'°',10,40);
    p.fill(16,185,129);p.textSize(11);p.text('✓ আপতন = প্রতিফলন (সূত্র প্রমাণিত)',10,58);
  };
  document.getElementById('simtip').textContent='স্লাইডার টেনে কোণ বদলাও — প্রতিফলন কোণ সবসময় সমান থাকে।';
}

function lever(p){
  let fp=50,load=50;
  const bar=document.getElementById('ctrlbar');
  bar.innerHTML=`
    <div class="srow"><label>ফালক্রাম</label><input type="range" min="10" max="90" value="50" oninput="this.nextSibling.textContent=this.value+'%';window._lFP=parseInt(this.value)"><span>50%</span></div>
    <div class="srow"><label>ভার (N)</label><input type="range" min="10" max="100" value="50" oninput="this.nextSibling.textContent=this.value+'N';window._lLD=parseInt(this.value)"><span>50N</span></div>`;
  window._lFP=50;window._lLD=50;
  p.setup=()=>{p.createCanvas(p.min(500,document.getElementById('p5host').offsetWidth||500),190);};
  p.draw=()=>{
    fp=window._lFP||50;load=window._lLD||50;
    p.background(13,17,23);
    const W=p.width,pivot=40+fp/100*(W-80),by=108;
    const la=pivot-40,ea=(W-40)-pivot,effort=ea>0?(load*la/ea):0;
    const tilt=Math.atan2((load-effort)*0.012,1);
    p.push();p.translate(pivot,by);p.rotate(tilt);
    p.fill(139,105,20);p.rect(-(pivot-40),-6,(W-80),12,2);
    p.fill(245,158,11,220);p.rect(-(pivot-40),6,16,load*0.45);
    p.fill(0,212,255,220);p.rect((W-40-pivot)-16,6,16,Math.abs(effort)*0.28);
    p.pop();
    // Fulcrum triangle
    p.fill(167,139,250);p.triangle(pivot,by,pivot-11,by+34,pivot+11,by+34);
    p.fill(71,85,105);p.rect(pivot-24,by+34,48,7,2);
    // Labels
    p.fill(245,158,11);p.textSize(12);p.textAlign(p.LEFT);p.text('ভার: '+load+'N',10,22);
    p.fill(0,212,255);p.text('বল: '+Math.abs(effort).toFixed(1)+'N',10,38);
    p.fill(16,185,129);p.text('যান্ত্রিক সুবিধা: '+(load>0?Math.abs(effort/load).toFixed(2):'—'),W-185,22);
    p.fill(167,139,250);p.textSize(10);p.textAlign(p.CENTER);p.text('ফালক্রাম',pivot,by+60);
  };
  document.getElementById('simtip').textContent='ফালক্রাম ও ভার পরিবর্তন করো — যান্ত্রিক সুবিধা কীভাবে বদলায় দেখো।';
}

function conductivity(p){
  const mats=[{n:'লোহা',c:true},{n:'তামা',c:true},{n:'রাবার',c:false},{n:'কাঠ',c:false},{n:'গ্রাফাইট',c:true},{n:'প্লাস্টিক',c:false}];
  let sel=0,on=false;
  const bar=document.getElementById('ctrlbar');
  function buildCtrl(){
    bar.innerHTML=`<button class="cbtn ${on?'on':''}" onclick="window._conOn=!window._conOn">${on?'সুইচ বন্ধ':'সুইচ চালু'}</button>`
    +mats.map((m,i)=>`<button class="cbtn ${sel===i?'on':''}" onclick="window._conSel=${i}">${m.n}</button>`).join('');
  }
  window._conOn=false;window._conSel=0;
  buildCtrl();
  p.setup=()=>{p.createCanvas(p.min(500,document.getElementById('p5host').offsetWidth||500),180);};
  p.draw=()=>{
    on=window._conOn;sel=window._conSel;
    const m=mats[sel],cd=on&&m.c;
    p.background(13,17,23);
    const W=p.width;
    // Battery
    p.fill(16,185,129);p.rect(25,78,34,34,3);p.fill(255);p.textSize(16);p.textAlign(p.CENTER);p.text('+',42,100);
    // Wires
    p.stroke(cd?p.color(0,212,255):p.color(51,65,85));p.strokeWeight(cd?3:2);p.noFill();
    p.line(59,95,105,95);p.line(25,95,25,150);p.line(25,150,W-40,150);p.line(W-40,150,W-40,95);
    p.line(W-85,95,W-40,95);
    // Material bar
    p.fill(120,113,108);p.noStroke();p.rect(105,85,W-190,20,2);
    p.fill(255);p.textSize(10);p.textAlign(p.CENTER);p.text(m.n,105+(W-190)/2,99);
    // Wire to bulb
    p.stroke(cd?p.color(0,212,255):p.color(51,65,85));p.strokeWeight(cd?3:2);
    p.line(105+(W-190),95,W-85,95);
    p.noStroke();
    // Bulb
    p.fill(cd?p.color(255,255,100,90):p.color(80,80,80,40));p.circle(W-63,95,44);
    p.noFill();p.stroke(cd?p.color(245,158,11):p.color(75,85,99));p.strokeWeight(2);p.circle(W-63,95,44);
    if(cd){p.stroke(255,255,100,60);p.strokeWeight(0.5);p.circle(W-63,95,60);}
    p.noStroke();p.fill(255);p.textSize(9);p.textAlign(p.CENTER);p.text('বাল্ব',W-63,126);
    // Switch indicator
    p.fill(on?p.color(100,150,95):p.color(80,80,80));p.circle(70,130,8);
    p.fill(148,163,184);p.textSize(9);p.textAlign(p.LEFT);p.text(on?'চালু':'বন্ধ',80,133);
    // Result
    p.fill(cd?p.color(16,185,129):p.color(239,68,68));p.textSize(12);p.text(on?(m.c?m.n+' — পরিবাহী ✓':m.n+' — অপরিবাহী ✗'):'সুইচ চালু করো',10,22);
  };
  document.getElementById('simtip').textContent='সুইচ চালু করো, তারপর বিভিন্ন পদার্থ বেছে নাও।';
}

function evaporation(p){
  let heat=0,wl=100,xtals=[],t=0,hting=false;
  const bar=document.getElementById('ctrlbar');
  bar.innerHTML=`<button class="cbtn" onclick="window._evHeat=!window._evHeat">তাপ দাও</button><button class="cbtn" onclick="window._evReset=true">রিসেট</button>`;
  window._evHeat=false;window._evReset=false;
  p.setup=()=>{p.createCanvas(p.min(500,document.getElementById('p5host').offsetWidth||500),200);};
  p.draw=()=>{
    if(window._evReset){heat=0;wl=100;xtals=[];t=0;hting=false;window._evReset=false;}
    hting=window._evHeat;
    if(hting&&wl>0){heat=p.min(heat+0.6,100);wl=p.max(wl-0.3,0);t+=0.1;if(wl<=30&&xtals.length<22&&p.random()<0.04)xtals.push({x:p.width/2-50+p.random(100),y:162+p.random(8),s:p.random(2,5)});}
    p.background(p.map(heat,0,100,13,30),p.map(heat,0,100,17,15),p.map(heat,0,100,23,20));
    const W=p.width;
    // Pan
    p.fill(146,64,14);p.rect(W/2-68,158,136,14,2);p.rect(W/2-58,153,116,8,2);
    // Flame
    if(hting)for(let i=0;i<5;i++){const fx=W/2-20+i*10,fy=152-Math.sin(t*5+i)*6;p.fill(255,100+i*20,0,180);p.noStroke();p.circle(fx,fy,15-i*2);}
    // Water
    if(wl>2){p.fill(59,130,246,p.map(wl,0,100,50,150));p.rect(W/2-56,168-wl*0.33,112,p.max(wl*0.33,2));}
    // Steam
    if(hting&&wl>0)for(let i=0;i<4;i++){p.fill(200,225,255,p.random(15,40));p.circle(W/2+(p.random()-0.5)*80,160-p.random(50),p.random(4,12));}
    // Crystals
    p.fill(255,255,255,200);xtals.forEach(x=>p.rect(x.x,x.y,x.s,x.s));
    if(xtals.length>0){p.fill(245,158,11);p.textSize(12);p.textAlign(p.CENTER);p.text('লবণের কেলাস তৈরি! ✓',W/2,18);}
    p.fill(245,158,11);p.textSize(11);p.textAlign(p.LEFT);p.text('তাপমাত্রা: '+(25+heat*1.5).toFixed(0)+'°C',10,22);
    p.fill(59,130,246);p.text('পানি: '+Math.round(wl)+'%',10,38);
  };
  document.getElementById('simtip').textContent='তাপ দাও বোতামে ক্লিক করো — পানি উড়ে যাবে, লবণ থাকবে।';
}

function atom_sim(p){
  let el='C',t=0;
  const els={C:{p:6,n:6,sh:[2,4],c:[148,163,184],nm:'কার্বন'},O:{p:8,n:8,sh:[2,6],c:[239,68,68],nm:'অক্সিজেন'},Na:{p:11,n:12,sh:[2,8,1],c:[245,158,11],nm:'সোডিয়াম'},Cl:{p:17,n:18,sh:[2,8,7],c:[16,185,129],nm:'ক্লোরিন'}};
  const bar=document.getElementById('ctrlbar');
  bar.innerHTML=Object.keys(els).map(k=>`<button class="cbtn" onclick="window._atEl='${k}'">${els[k].nm}</button>`).join('');
  window._atEl='C';
  p.setup=()=>{p.createCanvas(p.min(480,document.getElementById('p5host').offsetWidth||480),240);};
  p.draw=()=>{
    el=window._atEl||'C';t+=0.025;
    p.background(13,17,23);
    const e=els[el],cx=p.width/2,cy=p.height/2;
    // Nucleus glow
    p.drawingContext.shadowBlur=22;p.drawingContext.shadowColor=`rgb(${e.c[0]},${e.c[1]},${e.c[2]})`;
    p.fill(...e.c);p.circle(cx,cy,44);
    p.drawingContext.shadowBlur=0;
    p.fill(255);p.textSize(12);p.textAlign(p.CENTER);p.text(el,cx,cy+5);
    p.fill(148,163,184);p.textSize(10);p.textAlign(p.LEFT);p.text('p:'+e.p+' n:'+e.n,10,18);
    // Shells
    e.sh.forEach((cnt,si)=>{
      const r=50+si*34;
      p.noFill();p.stroke(255,255,255,20);p.strokeWeight(1);p.circle(cx,cy,r*2);
      for(let ei=0;ei<cnt;ei++){
        const a=t*(1.6/(si+1))+ei*(p.TWO_PI/cnt);
        p.drawingContext.shadowBlur=8;p.drawingContext.shadowColor='#60a5fa';
        p.fill(96,165,250);p.noStroke();p.circle(cx+Math.cos(a)*r,cy+Math.sin(a)*r,8);
        p.drawingContext.shadowBlur=0;
      }
    });
    p.fill(245,158,11);p.noStroke();p.textSize(13);p.textAlign(p.CENTER);p.text(e.nm+' পরমাণু',cx,p.height-8);
  };
  document.getElementById('simtip').textContent='বিভিন্ন মৌল বেছে নাও — ইলেকট্রন ঘুরছে দেখো।';
}

function magnet_sim(p){
  let show=true,str=1;
  const bar=document.getElementById('ctrlbar');
  bar.innerHTML=`<button class="cbtn on" onclick="window._mgShow=!window._mgShow">ক্ষেত্ররেখা লুকাও</button><div class="srow"><label>শক্তি</label><input type="range" min="0.5" max="2" step="0.1" value="1" oninput="this.nextSibling.textContent=this.value;window._mgStr=parseFloat(this.value)"><span>1</span></div>`;
  window._mgShow=true;window._mgStr=1;
  p.setup=()=>{p.createCanvas(p.min(480,document.getElementById('p5host').offsetWidth||480),240);};
  p.draw=()=>{
    show=window._mgShow;str=window._mgStr||1;
    p.background(13,17,23);
    const W=p.width,H=p.height,cx=W/2,cy=H/2;
    // Field lines
    if(show){
      for(let i=0;i<9;i++){
        const off=(i-4)*18*str;
        p.stroke(0,212,255,p.map(Math.abs(i-4),0,4,180,40));p.strokeWeight(1.5);p.noFill();
        p.beginShape();
        for(let tx=0;tx<=1;tx+=0.05){const a=tx*p.PI;p.vertex(cx-80+tx*160,cy+off+Math.sin(a)*off*0.25);}
        p.endShape();
      }
    }
    // Magnet
    const mw=55,mh=72;
    p.fill(220,38,38);p.noStroke();p.rect(cx-mw,cy-mh/2,mw,mh,3);
    p.fill(37,99,235);p.rect(cx,cy-mh/2,mw,mh,3);
    p.fill(255);p.textSize(18);p.textAlign(p.CENTER);p.text('N',cx-mw/2,cy+7);p.text('S',cx+mw/2,cy+7);
    p.fill(148,163,184);p.textSize(11);p.textAlign(p.LEFT);p.text('N মেরু থেকে S মেরুতে ক্ষেত্ররেখা প্রবাহিত',10,18);
  };

function photosynthesis(p){
  let light=5,co2=5,bubs=[],t=0;
  const bar=document.getElementById('ctrlbar');
  bar.innerHTML=`<div class="srow"><label>আলোর তীব্রতা</label><input type="range" min="0" max="10" value="5" oninput="this.nextSibling.textContent=this.value;window._phLight=parseInt(this.value)"><span>5</span></div><div class="srow"><label>CO₂ পরিমাণ</label><input type="range" min="0" max="10" value="5" oninput="this.nextSibling.textContent=this.value;window._phCo2=parseInt(this.value)"><span>5</span></div>`;
  window._phLight=5;window._phCo2=5;

  p.draw=()=>{
    light=window._phLight!==undefined?window._phLight:5;co2=window._phCo2!==undefined?window._phCo2:5;
    const rate=Math.max(0,(light+co2-4)/16);t+=0.05;
    p.background(p.map(light,0,10,13,22),p.map(light,0,10,17,28),p.map(light,0,10,23,38));

    // Sun

    p.fill(255,200,50,br*100);p.circle(W-52,36,56*br+16);
    p.fill(255,200,50,br*255);p.circle(W-52,36,26);
    // Leaf
    const g=Math.floor(50+rate*150);
    p.fill(20,g,30);p.noStroke();p.beginShape();
    p.vertex(W/2,200);p.bezierVertex(W/2-72,148,W/2-58,76,W/2,60);

    p.stroke(100,g+50,100,80);p.strokeWeight(1);p.line(W/2,200,W/2,78);p.noStroke();

    if(p.random()<rate*0.4)bubs.push({x:W/2+(p.random()-0.5)*70,y:100,r:p.random(2,5),life:1});
    bubs.forEach(b=>{b.y-=1.5;b.life-=0.02;p.fill(100,255,200,b.life*180);p.circle(b.x,b.y,b.r*2);});

    p.fill(245,158,11);p.textSize(12);p.textAlign(p.LEFT);p.text('সালোকসংশ্লেষণ হার: '+(rate*100).toFixed(0)+'%',10,22);

}

    // Labels

/* ═══════════ 3D MODAL (Three.js) ═══════════ */
function open3D(id,key){
  const x=D[key].m3d.find(m=>m.id===id);if(!x)return;
  const legend=x.parts||[];
  const colors=['#00d4ff','#a78bfa','#10b981','#f59e0b','#ef4444','#60a5fa','#fb923c','#34d399'];
  modal(`
    <button class="mx" onclick="closeModal()">✕</button>
    <div class="mh2">🌐 ${x.t}</div>
    <div class="mc2">📖 ${x.ch}</div>

      <canvas id="tdcanvas"></canvas>
      <div class="tdlbl">🌐 Three.js 3D — ড্র্যাগ করে ঘোরাও</div>
      <div class="tdhint">drag to rotate · scroll to zoom</div>
    </div>
    <div class="legend">${legend.map((p,i)=>`<span class="leg" style="background:${colors[i%colors.length]}22;border-color:${colors[i%colors.length]}66;color:${colors[i%colors.length]}">${p}</span>`).join('')}</div>
    <button class="askbtn" onclick="askAboutExperiment('${x.t.replace(/'/g,"\\'")}','${x.ch}')">🤖 এই থ্রিডি মডেল সম্পর্কে AI-কে প্রশ্ন করো</button>`);
  setTimeout(()=>launch3D(id,x),80);

function launch3D(id,x){
  const cv=document.getElementById('tdcanvas');if(!cv)return;
  cv.width=cv.clientWidth||600;cv.height=cv.clientHeight||300;
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(60,cv.width/cv.height,0.1,200);
  camera.position.set(0,0,10);
  const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  renderer.setSize(cv.width,cv.height);
  renderer.setClearColor(0x04070f,1);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  window._tdRenderer=renderer;
  scene.add(new THREE.AmbientLight(0xffffff,0.55));
  const dl=new THREE.DirectionalLight(0xffffff,0.85);dl.position.set(5,8,5);scene.add(dl);
  const pl=new THREE.PointLight(0x00d4ff,0.5,50);pl.position.set(-5,3,5);scene.add(pl);

  // Build model
  const group=new THREE.Group();
  const C={solar_system:buildSolar,atom:buildAtom,plant_cell:buildCell,dna:buildDNA,earth_layers:buildEarth,magnet:buildMagnet,mitosis:buildMitosis};
  (C[id]||buildGeneric)(group,x);
  scene.add(group);

  // Drag
  let isDrag=false,px=0,py=0;
  cv.addEventListener('mousedown',e=>{isDrag=true;px=e.clientX;py=e.clientY;});
  window.addEventListener('mouseup',()=>isDrag=false);
  cv.addEventListener('mousemove',e=>{if(!isDrag)return;group.rotation.y+=(e.clientX-px)*0.01;group.rotation.x+=(e.clientY-py)*0.01;px=e.clientX;py=e.clientY;});
  cv.addEventListener('touchstart',e=>{isDrag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;},{passive:true});
  cv.addEventListener('touchend',()=>isDrag=false,{passive:true});
  cv.addEventListener('touchmove',e=>{if(!isDrag)return;group.rotation.y+=(e.touches[0].clientX-px)*0.009;group.rotation.x+=(e.touches[0].clientY-py)*0.009;px=e.touches[0].clientX;py=e.touches[0].clientY;},{passive:true});
  // Scroll zoom
  cv.addEventListener('wheel',e=>{camera.position.z=Math.max(3,Math.min(20,camera.position.z+e.deltaY*0.01));},{passive:true});

  let animT=0;
  function animate(){
    window._tdRaf=requestAnimationFrame(animate);
    animT+=0.012;
    if(!isDrag) group.rotation.y+=0.006;
    // animate electrons in atom
    if(id==='atom'||id==='atom_sim'){
      group.children.forEach(c=>{if(c.userData.isElectron){const a=c.userData.baseAngle+animT*(c.userData.speed||1);c.position.set(Math.cos(a)*c.userData.r,c.userData.yi*Math.sin(animT*0.3),Math.sin(a)*c.userData.r);}});
    }
    if(id==='solar_system'){
      group.children.forEach(c=>{if(c.userData.isPlanet){const a=animT*c.userData.speed;c.position.x=Math.cos(a)*c.userData.dist;c.position.z=Math.sin(a)*c.userData.dist;c.rotation.y+=0.02;}});
    }
    renderer.render(scene,camera);
  }
  animate();
}

function buildSolar(g){
  // Sun
  const sun=new THREE.Mesh(new THREE.SphereGeometry(1.2,32,32),new THREE.MeshBasicMaterial({color:0xfbbf24}));
  sun.add(new THREE.PointLight(0xfbbf24,2,50));g.add(sun);
  // Stars
  const sG=new THREE.BufferGeometry();const sP=[];
  for(let i=0;i<600;i++)sP.push((Math.random()-.5)*120,(Math.random()-.5)*120,(Math.random()-.5)*120);
  sG.setAttribute('position',new THREE.Float32BufferAttribute(sP,3));
  g.add(new THREE.Points(sG,new THREE.PointsMaterial({color:0xffffff,size:0.18})));
  // Planets
  [{r:.28,d:2.8,c:0x9ca3af,sp:4.2,nm:'বুধ'},{r:.45,d:4.2,c:0xfbbf24,sp:3.2,nm:'শুক্র'},{r:.48,d:5.8,c:0x3b82f6,sp:2.6,nm:'পৃথিবী'},{r:.32,d:7.4,c:0xef4444,sp:2,nm:'মঙ্গল'},{r:1.0,d:10.5,c:0xf97316,sp:1.1,nm:'বৃহস্পতি'},{r:.85,d:13.5,c:0xe2c49f,sp:0.8,nm:'শনি'}].forEach(pl=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(pl.r,18,18),new THREE.MeshPhongMaterial({color:pl.c}));
    m.position.x=pl.d;m.userData={isPlanet:true,dist:pl.d,speed:pl.sp};g.add(m);
    // Orbit ring
    const oG=new THREE.RingGeometry(pl.d-.03,pl.d+.03,64);
    const oM=new THREE.MeshBasicMaterial({color:0x334155,side:THREE.DoubleSide,transparent:true,opacity:.35});
    const oring=new THREE.Mesh(oG,oM);oring.rotation.x=Math.PI/2;g.add(oring);
    if(pl.nm==='শনি'){const rG=new THREE.RingGeometry(pl.r+.3,pl.r+1,32);const rM=new THREE.MeshBasicMaterial({color:0xe2c49f,side:THREE.DoubleSide,transparent:true,opacity:.55});const ring=new THREE.Mesh(rG,rM);ring.rotation.x=1.2;m.add(ring);}
  });
  g.scale.set(0.65,0.65,0.65);
}

function buildAtom(g){
  // Nucleus cluster
  const nc=[0xef4444,0x94a3b8];
  for(let i=0;i<10;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(.22,12,12),new THREE.MeshPhongMaterial({color:nc[i%2]}));m.position.set((Math.random()-.5)*.7,(Math.random()-.5)*.7,(Math.random()-.5)*.7);g.add(m);}
  // Shells
  const shells=[[2,2.2,1.4],[8,3.8,0.9],[1,5.2,0.7]];
  shells.forEach(([cnt,r,sp],si)=>{
    const oG=new THREE.TorusGeometry(r,.04,6,64);const oM=new THREE.MeshBasicMaterial({color:0x334155});
    const torus=new THREE.Mesh(oG,oM);torus.rotation.x=si*0.55;torus.rotation.y=si*0.3;g.add(torus);
    for(let ei=0;ei<cnt;ei++){
      const em=new THREE.Mesh(new THREE.SphereGeometry(.15,10,10),new THREE.MeshPhongMaterial({color:0x60a5fa,emissive:0x1d4ed8,emissiveIntensity:.4}));
      em.userData={isElectron:true,r,sp,baseAngle:ei*(Math.PI*2/cnt),yi:si*.4};
      g.add(em);
    }
  });
  g.scale.set(0.75,0.75,0.75);
}

function buildCell(g){
  // Cell wall
  const cw=new THREE.Mesh(new THREE.BoxGeometry(5,3.5,.1),new THREE.MeshPhongMaterial({color:0x4ade80,transparent:true,opacity:.18,wireframe:false}));
  const cwW=new THREE.Mesh(new THREE.BoxGeometry(5,3.5,.1),new THREE.MeshBasicMaterial({color:0x4ade80,wireframe:true,transparent:true,opacity:.18}));
  g.add(cw);g.add(cwW);
  // Nucleus
  const nuc=new THREE.Mesh(new THREE.SphereGeometry(.65,20,20),new THREE.MeshPhongMaterial({color:0xa855f7}));nuc.position.set(.1,.1,.15);g.add(nuc);
  // Chloroplasts
  [[1.4,.7],[-.9,.9],[1.3,-.5],[-.5,-.8]].forEach(([x,y])=>{const gx=new THREE.SphereGeometry(.28,12,12);gx.scale(1.6,1,.8);const m=new THREE.Mesh(gx,new THREE.MeshPhongMaterial({color:0x16a34a}));m.position.set(x,y,.15);g.add(m);});
  // Mitochondria
  [[-1.3,-.4],[.6,.95],[-1.1,.5]].forEach(([x,y])=>{const gx=new THREE.SphereGeometry(.22,12,12);gx.scale(1.5,1,1);const m=new THREE.Mesh(gx,new THREE.MeshPhongMaterial({color:0xf97316}));m.position.set(x,y,.15);g.add(m);});
  // Vacuole
  const vac=new THREE.Mesh(new THREE.SphereGeometry(.75,16,16),new THREE.MeshPhongMaterial({color:0x38bdf8,transparent:true,opacity:.38}));vac.position.set(-.35,.1,.1);g.add(vac);
  g.scale.set(.85,.85,.85);
}

function buildDNA(g){
  const cols={A:0x60a5fa,T:0xf59e0b,G:0x10b981,C:0xef4444};
  const pairs=[['A','T'],['G','C'],['T','A'],['C','G'],['A','T'],['G','C'],['T','A'],['C','G'],['A','T'],['G','C']];
  pairs.forEach((pr,i)=>{
    const angle=i*.65,y=i*.85-4.3,r=1.9;
    // Backbone
    [[r,angle],[r,angle+Math.PI]].forEach(([rad,ang])=>{const m=new THREE.Mesh(new THREE.SphereGeometry(.23,10,10),new THREE.MeshPhongMaterial({color:0x94a3b8}));m.position.set(Math.cos(ang)*rad,y,Math.sin(ang)*rad);g.add(m);});
    // Bases
    [0,1].forEach(bi=>{const ang=angle+bi*Math.PI;const m=new THREE.Mesh(new THREE.SphereGeometry(.27,10,10),new THREE.MeshPhongMaterial({color:cols[pr[bi]],emissive:cols[pr[bi]],emissiveIntensity:.15}));m.position.set(Math.cos(ang)*.82,y,Math.sin(ang)*.82);g.add(m);});
  });
  g.scale.set(.82,.82,.82);
}

function buildEarth(g){
  // Layers (cut in half via clipping)
  renderer_ref_bypass:if(window._tdRenderer){window._tdRenderer.localClippingEnabled=true;}
  [[3.8,0x4ade80,.45],[3.1,0xf97316,.6],[2.1,0xef4444,.7],[1.1,0xfbbf24,1]].forEach(([r,c,o])=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(r,32,32),new THREE.MeshPhongMaterial({color:c,transparent:true,opacity:o,side:THREE.DoubleSide}));g.add(m);
  });
  if(window._tdRenderer){const clip=new THREE.Plane(new THREE.Vector3(1,0,0),0);window._tdRenderer.clippingPlanes=[clip];}
  g.scale.set(.7,.7,.7);
}

function buildMagnet(g){
  const nMesh=new THREE.Mesh(new THREE.BoxGeometry(1.4,3,.9),new THREE.MeshPhongMaterial({color:0xdc2626}));
  nMesh.position.set(0,1.5,0);g.add(nMesh);
  const sMesh=new THREE.Mesh(new THREE.BoxGeometry(1.4,3,.9),new THREE.MeshPhongMaterial({color:0x2563eb}));
  sMesh.position.set(0,-1.5,0);g.add(sMesh);
  // Field lines
  for(let i=0;i<7;i++){
    const ang=i*(Math.PI*2/7);const pts=[];
    for(let t=0;t<=1;t+=0.06){const a=t*Math.PI;pts.push(new THREE.Vector3(Math.cos(ang)*2.2*Math.sin(a),3-t*6,Math.sin(ang)*2.2*Math.sin(a)));}
    const curve=new THREE.CatmullRomCurve3(pts);
    const tG=new THREE.TubeGeometry(curve,18,.05,5,false);
    const tM=new THREE.MeshBasicMaterial({color:0x00d4ff,transparent:true,opacity:.38});
    g.add(new THREE.Mesh(tG,tM));
  }
  g.scale.set(.75,.75,.75);
}

function buildMitosis(g){
  // Simple cell division representation
  const c1=new THREE.Mesh(new THREE.SphereGeometry(2.2,24,24),new THREE.MeshPhongMaterial({color:0x1e3a5f,transparent:true,opacity:.65}));
  c1.position.x=-2.4;g.add(c1);
  const c2=new THREE.Mesh(new THREE.SphereGeometry(2.2,24,24),new THREE.MeshPhongMaterial({color:0x1e3a5f,transparent:true,opacity:.65}));
  c2.position.x=2.4;g.add(c2);
  const n1=new THREE.Mesh(new THREE.SphereGeometry(.7,16,16),new THREE.MeshPhongMaterial({color:0xa855f7}));n1.position.x=-2.4;g.add(n1);
  const n2=new THREE.Mesh(new THREE.SphereGeometry(.7,16,16),new THREE.MeshPhongMaterial({color:0xa855f7}));n2.position.x=2.4;g.add(n2);
  // Chromosomes
  for(let i=0;i<4;i++){const gc=new THREE.SphereGeometry(.2,8,8);const mc=new THREE.MeshPhongMaterial({color:0xf59e0b});const chr=new THREE.Mesh(gc,mc);chr.position.set(-2.4+(i-.5-1.5)*.5,0,0);g.add(chr);}
  for(let i=0;i<4;i++){const gc=new THREE.SphereGeometry(.2,8,8);const mc=new THREE.MeshPhongMaterial({color:0xf59e0b});const chr=new THREE.Mesh(gc,mc);chr.position.set(2.4+(i-.5-1.5)*.5,0,0);g.add(chr);}
  g.scale.set(.55,.55,.55);
}

function buildGeneric(g,x){
  const cols=[0x00d4ff,0xa855f7,0x10b981,0xf59e0b,0xef4444,0x60a5fa,0xfb923c,0x34d399];
  const shapes=['sphere','box','cylinder','cone'];
  (x.parts||['অংশ ১','অংশ ২','অংশ ৩']).forEach((part,i)=>{
    const sh=shapes[i%shapes.length];
    let geo;
    if(sh==='sphere')geo=new THREE.SphereGeometry(.55,16,16);
    else if(sh==='box')geo=new THREE.BoxGeometry(.85,.85,.85);
    else if(sh==='cylinder')geo=new THREE.CylinderGeometry(.4,.4,1,16);
    else geo=new THREE.ConeGeometry(.45,.95,16);
    const mat=new THREE.MeshPhongMaterial({color:cols[i%cols.length],transparent:true,opacity:.88});
    const m=new THREE.Mesh(geo,mat);
    const ang=(i/(x.parts.length))*Math.PI*2;const r=i===0?0:2.2;
    m.position.set(Math.cos(ang)*r,Math.sin(ang)*r*0.4,0);
    g.add(m);
  });
}

// Init
render();

/* ═══════════ AI CHATBOT ═══════════ */
let chatHistory=[],chatContext=null;

function toggleChat(){
  if(document.querySelector('.chatpanel')){closeChat();return;}
  openChat();
}

function openChat(){
  const panel=document.createElement('div');panel.className='chatpanel';
  panel.innerHTML=`
    <div class="chathead">
      <span class="ti">🤖 বিজ্ঞান সহায়ক</span>
      <button class="chatclose" onclick="closeChat()">✕</button>
    </div>
    ${chatContext?`<div class="chatctx" id="chatctxbar">📖 প্রসঙ্গ: ${chatContext}</div>`:''}
    <div class="chatbody" id="chatbody"></div>
    <div class="chatinput">
      <textarea id="chatinp" placeholder="প্রশ্ন লেখো... (যেমন: এই পরীক্ষায় কেন এটা হয়?)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
      <button class="sendbtn" id="sendbtn" onclick="sendChat()">➤</button>
    </div>`;
  document.body.appendChild(panel);
  const body=document.getElementById('chatbody');
  if(chatHistory.length===0){
    addMsg('bot', chatContext
      ? `হ্যালো! আমি তোমার বিজ্ঞান সহায়ক। "${chatContext}" সম্পর্কে যেকোনো প্রশ্ন করতে পারো — কেন হয়, কীভাবে কাজ করে, বা কোনো ধাপ বুঝতে সমস্যা হচ্ছে কিনা।`
      : `হ্যালো! আমি তোমার বিজ্ঞান সহায়ক 🔬 কোনো এক্সপেরিমেন্ট, থ্রিডি মডেল, বা পদার্থবিজ্ঞান/রসায়ন/জীববিজ্ঞানের কোনো বিষয় নিয়ে প্রশ্ন করো।`);
  } else {
    chatHistory.forEach(m=>addMsg(m.role==='user'?'user':'bot', m.content,false));
    body.scrollTop=body.scrollHeight;
  }
  setTimeout(()=>document.getElementById('chatinp')?.focus(),100);
}

function closeChat(){
  const panel=document.querySelector('.chatpanel');
  if(panel)panel.remove();
}

function askAboutExperiment(title,chapter){
  chatContext=title+' ('+chapter+')';
  chatHistory=[]; // fresh context for this experiment
  closeChat();
  openChat();
}

function addMsg(role,text,scroll=true){
  const body=document.getElementById('chatbody');
  if(!body)return;
  const div=document.createElement('div');
  div.className='msg '+role;
  div.textContent=text;
  body.appendChild(div);
  if(scroll)body.scrollTop=body.scrollHeight;
  return div;
}

async function sendChat(){
  const inp=document.getElementById('chatinp');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  addMsg('user',text);
  chatHistory.push({role:'user',content:text});
  const sendBtn=document.getElementById('sendbtn');
  sendBtn.disabled=true;
  const loadingDiv=addMsg('bot','উত্তর তৈরি হচ্ছে...');
  loadingDiv.classList.add('loading');

  const systemPrompt=`তুমি "বিজ্ঞানের পাঠশালা" ওয়েবসাইটের একজন বন্ধুত্বপূর্ণ বিজ্ঞান শিক্ষক সহায়ক। NCTB দাখিল (৬ষ্ঠ-১০ম শ্রেণি) পাঠ্যক্রম অনুযায়ী শিক্ষার্থীদের পদার্থবিজ্ঞান, রসায়ন ও জীববিজ্ঞানের এক্সপেরিমেন্ট ও থ্রিডি মডেল বুঝতে সাহায্য করো।
- সবসময় বাংলায় উত্তর দাও, সহজ ও সংক্ষিপ্ত ভাষায় (৩-৫ বাক্যের মধ্যে)।
- শিক্ষার্থীর বয়স ও স্তর অনুযায়ী ব্যাখ্যা দাও।
- উদাহরণ ও দৈনন্দিন জীবনের সাথে সম্পর্ক করে ব্যাখ্যা করো।
- যদি কোনো এক্সপেরিমেন্ট নিয়ে প্রশ্ন হয়, কেন ফলাফল এমন হয় তা বৈজ্ঞানিক কারণ দিয়ে ব্যাখ্যা করো।
${chatContext?`- বর্তমান প্রসঙ্গ: শিক্ষার্থী "${chatContext}" এক্সপেরিমেন্ট/মডেল দেখছে।`:''}`;

  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        system:systemPrompt,
        messages:chatHistory
      })
    });
    const data=await response.json();
    let reply='';
    if(data.content){
      reply=data.content.map(c=>c.text||'').join('\n').trim();
    }
    if(!reply)reply='দুঃখিত, উত্তর তৈরি করা যায়নি। আবার চেষ্টা করো।';
    loadingDiv.remove();
    addMsg('bot',reply);
    chatHistory.push({role:'assistant',content:reply});
  }catch(err){
    loadingDiv.remove();
    addMsg('bot','⚠️ একটি সমস্যা হয়েছে। ইন্টারনেট সংযোগ পরীক্ষা করে আবার চেষ্টা করো।');
    console.error(err);
  }
  sendBtn.disabled=false;
  document.getElementById('chatinp')?.focus();
}
</script>
